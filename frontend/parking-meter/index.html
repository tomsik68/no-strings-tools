<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parking Meter</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .calculator {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .input-group {
      margin-bottom: 12px;
    }
    .input-group label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
      font-weight: 600;
    }
    input, select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .result-box {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      text-align: center;
    }
    .result-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .result-value {
      font-size: 32px;
      font-weight: bold;
      color: #2196f3;
      font-family: monospace;
    }
    .breakdown {
      background: #f0f8ff;
      padding: 12px;
      border-radius: 4px;
      margin-top: 12px;
      border-left: 4px solid #2196f3;
      font-size: 12px;
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Parking Meter</h1>

    <div class="calculator">
      <h3>Parking Rate</h3>

      <div class="grid-2">
        <div class="input-group">
          <label>Rate Amount</label>
          <input id="rate-amount" type="number" value="3" min="0" step="0.01" />
        </div>
        <div class="input-group">
          <label>Per</label>
          <select id="rate-period">
            <option value="hour">Hour</option>
            <option value="30min">30 Minutes</option>
            <option value="day">Day</option>
          </select>
        </div>
      </div>
    </div>

    <div class="calculator">
      <h3>Parking Duration</h3>

      <div class="grid-2">
        <div class="input-group">
          <label>Hours</label>
          <input id="duration-hours" type="number" value="2" min="0" />
        </div>
        <div class="input-group">
          <label>Minutes</label>
          <input id="duration-minutes" type="number" value="0" min="0" max="59" />
        </div>
      </div>
    </div>

    <div class="result-box">
      <div class="result-label">Total Cost</div>
      <div class="result-value" id="total-cost">$0.00</div>
    </div>

    <div class="breakdown" id="breakdown"></div>

    <div class="calculator" style="margin-top: 20px;">
      <h3>Or: How Long Can I Park?</h3>

      <div class="input-group">
        <label>Budget</label>
        <input id="budget" type="number" value="10" min="0" step="0.01" placeholder="$" />
      </div>

      <div class="result-box">
        <div class="result-label">Parking Duration</div>
        <div class="result-value" id="max-duration">2h 0m</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
