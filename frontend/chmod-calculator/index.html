<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Chmod Calculator</h1>
    <p class="w3-text-grey w3-small">Unix file permissions: checkboxes ↔ octal ↔ symbolic.</p>

    <div class="octal-row">
      <label for="octal" style="font-weight: 600;">Octal:</label>
      <input id="octal" type="text" maxlength="3" value="755" autocomplete="off" />
    </div>

    <table>
      <tr><th></th><th>Read (4)</th><th>Write (2)</th><th>Execute (1)</th></tr>
      <tr><td>Owner</td><td><input type="checkbox" data-bit="8" aria-label="Owner read" /></td><td><input type="checkbox" data-bit="7" aria-label="Owner write" /></td><td><input type="checkbox" data-bit="6" aria-label="Owner execute" /></td></tr>
      <tr><td>Group</td><td><input type="checkbox" data-bit="5" aria-label="Group read" /></td><td><input type="checkbox" data-bit="4" aria-label="Group write" /></td><td><input type="checkbox" data-bit="3" aria-label="Group execute" /></td></tr>
      <tr><td>Others</td><td><input type="checkbox" data-bit="2" aria-label="Others read" /></td><td><input type="checkbox" data-bit="1" aria-label="Others write" /></td><td><input type="checkbox" data-bit="0" aria-label="Others execute" /></td></tr>
    </table>

    <div class="result-box">
      <div class="result-label">Symbolic</div>
      <div class="result-value" id="symbolic"></div>
    </div>
    <div class="result-box">
      <div class="result-label">Command</div>
      <div class="result-value" id="command"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
