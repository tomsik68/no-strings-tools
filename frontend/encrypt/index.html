<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encrypt/Decrypt</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
  <style>
    .input-section {
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      font-family: monospace;
      font-size: 13px;
      resize: vertical;
      min-height: 100px;
    }
    .button-group {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .btn-encrypt {
      background-color: #4caf50;
      color: white;
    }
    .btn-encrypt:hover {
      background-color: #45a049;
    }
    .btn-decrypt {
      background-color: #2196f3;
      color: white;
    }
    .btn-decrypt:hover {
      background-color: #0b7dda;
    }
    .btn-copy {
      background-color: #ff9800;
      color: white;
    }
    .btn-copy:hover {
      background-color: #e68900;
    }
    .btn-clear {
      background-color: #f44336;
      color: white;
    }
    .btn-clear:hover {
      background-color: #da190b;
    }
    .output-section {
      margin-top: 20px;
      padding: 16px;
      background-color: #f9f9f9;
      border-radius: 4px;
    }
    .output-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .output-text {
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 12px;
      word-break: break-all;
      font-family: monospace;
      font-size: 13px;
      min-height: 60px;
      max-height: 300px;
      overflow-y: auto;
      color: #333;
    }
    .empty-output {
      color: #999;
      font-style: italic;
    }
    .feedback {
      color: #4caf50;
      font-size: 12px;
      margin-top: 8px;
      min-height: 18px;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Encrypt/Decrypt</h1>

    <div class="input-section">
      <label for="password-input" class="w3-text-grey">Password</label>
      <input
        id="password-input"
        type="password"
        class="w3-input w3-border w3-round w3-margin-bottom"
        placeholder="Enter a strong password..."
        autocomplete="off"
      />
    </div>

    <div class="input-section">
      <label for="text-input" class="w3-text-grey">Text</label>
      <textarea id="text-input" class="w3-input w3-border w3-round w3-margin-bottom" placeholder="Enter text to encrypt or ciphertext to decrypt..."></textarea>
    </div>

    <div class="button-group">
      <button id="encrypt-btn" class="w3-button w3-round btn-encrypt">Encrypt</button>
      <button id="decrypt-btn" class="w3-button w3-round btn-decrypt">Decrypt</button>
      <button id="copy-btn" class="w3-button w3-round btn-copy">Copy Output</button>
      <button id="clear-btn" class="w3-button w3-round btn-clear">Clear</button>
    </div>

    <div class="output-section">
      <div class="output-label">Output</div>
      <div class="output-text" id="output-text">
        <span class="empty-output">Output will appear here...</span>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
