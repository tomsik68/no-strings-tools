<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barcode Scanner</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    video { width: 100%; border-radius: 8px; background: #000; margin-top: 16px; display: none; }
    .start-btn { width: 100%; padding: 16px; font-size: 17px; margin-top: 16px; }
    .hit { background: white; padding: 10px 12px; border-radius: 8px; margin-top: 8px; border-left: 4px solid #4caf50; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .hit .value { font-family: monospace; word-break: break-all; }
    .hit .fmt { font-size: 11px; color: #999; }
    .error { background: #ffcdd2; color: #c62828; padding: 12px; border-radius: 4px; margin-top: 16px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto; margin-bottom: 24px;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Barcode Scanner</h1>
    <p class="w3-text-grey w3-small">Point the camera at any barcode — EAN, UPC, Code 128, QR and more. Uses the browser's built-in detector; nothing leaves your device.</p>

    <button id="toggle-btn" class="w3-button w3-blue w3-round start-btn">📷 Start scanning</button>
    <video id="video" playsinline muted></video>
    <div id="hits"></div>
    <div class="error" id="error" style="display: none;"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
