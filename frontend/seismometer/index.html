<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seismometer</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    #trace { width: 100%; height: 220px; background: #111; border-radius: 8px; margin-top: 16px; display: block; }
    .readout { display: flex; justify-content: space-around; margin-top: 12px; text-align: center; }
    .readout b { display: block; font-size: 26px; font-variant-numeric: tabular-nums; }
    .readout span { font-size: 11px; color: #888; }
    .start-btn { width: 100%; padding: 16px; font-size: 17px; margin-top: 16px; }
    .error { background: #ffcdd2; color: #c62828; padding: 12px; border-radius: 4px; margin-top: 16px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Seismometer</h1>
    <p class="w3-text-grey w3-small">Live vibration trace from your phone's accelerometer. Put the phone on a table and see footsteps, door slams, a passing truck — or the washing machine's spin cycle.</p>

    <canvas id="trace"></canvas>
    <div class="readout">
      <div><b id="current">0.00</b><span>NOW m/s²</span></div>
      <div><b id="peak">0.00</b><span>PEAK m/s²</span></div>
    </div>

    <button id="toggle-btn" class="w3-button w3-blue w3-round start-btn">📈 Start</button>
    <div class="error" id="error" style="display: none;"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
