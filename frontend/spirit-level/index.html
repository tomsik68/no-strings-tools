<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spirit Level</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .level-display {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .level-axis {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    .axis-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .bubble-container {
      position: relative;
      height: 200px;
      background: linear-gradient(90deg, #e3f2fd 0%, #fff3e0 50%, #f3e5f5 100%);
      border-radius: 8px;
      border: 2px solid #ddd;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .bubble {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #4caf50, #2e7d32);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: all 0.05s ease-out;
    }
    .bubble.level {
      background: radial-gradient(circle at 30% 30%, #4caf50, #2e7d32);
    }
    .angle-display {
      font-size: 24px;
      font-weight: bold;
      color: #333;
      font-family: monospace;
    }
    .status-display {
      text-align: center;
      font-size: 18px;
      margin-top: 20px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    .status-display.level {
      background: #c8e6c9;
      color: #2e7d32;
      font-weight: bold;
    }
    .status-display.tilted {
      background: #fff3e0;
      color: #f57c00;
    }
    .permission-message {
      text-align: center;
      color: #f44336;
      margin-top: 20px;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Spirit Level</h1>

    <p class="w3-text-grey w3-small">Place your device on a surface to check if it's level.</p>

    <div class="level-display">
      <div class="level-axis">
        <div class="axis-label">X-Axis (Left-Right)</div>
        <div class="bubble-container">
          <div class="bubble" id="bubble-x"></div>
        </div>
        <div class="angle-display" id="angle-x">0°</div>
      </div>

      <div class="level-axis">
        <div class="axis-label">Y-Axis (Forward-Back)</div>
        <div class="bubble-container">
          <div class="bubble" id="bubble-y"></div>
        </div>
        <div class="angle-display" id="angle-y">0°</div>
      </div>
    </div>

    <div class="status-display" id="status-display">Waiting for motion data...</div>
    <div class="permission-message" id="permission-message"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
