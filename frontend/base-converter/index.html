<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base Converter</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .input-row { display: grid; grid-template-columns: 1fr 120px; gap: 12px; margin-bottom: 12px; }
    input { padding: 8px; font-family: monospace; border: 1px solid #ddd; border-radius: 4px; }
    select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    .base-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
    .base-box { background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #2196f3; }
    .base-label { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 4px; }
    .base-value { font-family: monospace; font-size: 14px; word-break: break-all; color: #333; }
    .error { background: #ffcdd2; color: #c62828; padding: 12px; border-radius: 4px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Base Converter</h1>
    <p class="w3-text-grey w3-small">Convert from any base to others: binary, octal, decimal, hex.</p>

    <div class="input-row">
      <input id="input" type="text" placeholder="Enter number" autocomplete="off" value="42" />
      <select id="base-select">
        <option value="10">Decimal</option>
        <option value="2">Binary</option>
        <option value="8">Octal</option>
        <option value="16">Hex</option>
      </select>
    </div>

    <div class="base-grid" id="bases"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
