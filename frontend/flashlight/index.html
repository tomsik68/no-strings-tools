<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashlight</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    body { transition: background 0.2s; }
    body.lit { background: #ffffff; }
    .toggle-btn { width: 100%; padding: 32px; font-size: 24px; margin-top: 16px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Flashlight</h1>
    <p class="w3-text-grey w3-small">Uses your phone's camera flash. No flash? The screen goes full white and stays awake instead — turn your brightness up.</p>

    <button id="toggle-btn" class="w3-button w3-blue w3-round toggle-btn">🔦 Turn on</button>
    <p id="mode" class="w3-center w3-text-grey w3-small" style="margin-top: 12px;">&nbsp;</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
