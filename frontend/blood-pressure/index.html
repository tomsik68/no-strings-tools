  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .card { max-width: 500px; margin: 0 auto; }
    .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .stat { background: white; border-radius: 8px; padding: 12px 14px; flex: 1; text-align: center; border: 1px solid #eee; }
    .stat-val { font-size: 18px; font-weight: 700; color: #222; }
    .stat-lbl { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
    .reading-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: white; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; }
    .reading-bp { font-size: 18px; font-weight: 700; color: #222; flex-shrink: 0; }
    .reading-info { flex: 1; min-width: 0; }
    .reading-date { font-size: 12px; color: #999; }
    .reading-pulse { font-size: 12px; color: #bbb; }
    .badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
    .badge.normal   { background: #e8f5e9; color: #2e7d32; }
    .badge.elevated { background: #fff8e1; color: #f57f17; }
    .badge.high1    { background: #fff3e0; color: #e65100; }
    .badge.high2    { background: #fde8e8; color: #c62828; }
    .badge.crisis   { background: #b71c1c; color: white; }
    .del-btn { background: none; border: none; color: #ddd; cursor: pointer; font-size: 18px; padding: 0 2px; line-height: 1; flex-shrink: 0; }
    .del-btn:hover { color: #f44336; }
    .add-form { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    @media (max-width: 460px) { .form-grid { grid-template-columns: 1fr 1fr; } }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .field input { padding: 9px 11px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; font-family: inherit; }
    .field input:focus { outline: none; border-color: #e53935; }
    .add-row { display: flex; justify-content: flex-end; }
    .empty { text-align: center; color: #bbb; padding: 32px 0; font-size: 14px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large card">
    <a href="../index.html" class="w3-text-blue" style="text-decoration:none; font-size:14px;">← Back</a>
    <h1 style="margin-bottom:4px;">🩸 Blood Pressure Log</h1>
    <p class="w3-text-grey" style="margin-top:0; font-size:13px;">Log readings. Know your numbers.</p>

    <div id="stats"></div>
    <div id="readings-list"></div>

    <div class="add-form">
      <div class="form-grid">
        <div class="field" style="grid-column:1/-1">
          <label for="bp-date">Date</label>
          <input id="bp-date" type="date" />
        </div>
        <div class="field">
          <label for="bp-sys">Systolic</label>
          <input id="bp-sys" type="number" min="50" max="300" placeholder="120" />
        </div>
        <div class="field">
          <label for="bp-dia">Diastolic</label>
          <input id="bp-dia" type="number" min="30" max="200" placeholder="80" />
        </div>
        <div class="field">
          <label for="bp-pulse">Pulse (opt.)</label>
          <input id="bp-pulse" type="number" min="30" max="250" placeholder="72" />
        </div>
      </div>
      <div class="add-row">
        <button id="add-btn" class="w3-button w3-round" style="background:#e53935; color:white;">Log Reading</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
