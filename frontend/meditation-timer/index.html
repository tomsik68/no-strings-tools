  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .timer-display {
      font-size: 64px;
      font-weight: bold;
      text-align: center;
      font-family: monospace;
      color: #2196f3;
      margin: 40px 0;
      letter-spacing: 2px;
    }
    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .preset-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .preset-btn {
      padding: 8px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #ddd;
      background: white;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .preset-btn:hover {
      background: #f5f5f5;
    }
    .preset-btn.active {
      background: #2196f3;
      color: white;
      border-color: #2196f3;
    }
    .status {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 20px;
    }
    input[type="range"] {
      width: 100%;
      margin: 20px 0;
    }
  </style>

<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>🧘 Meditation Timer</h1>

    <div class="preset-buttons" id="presets"></div>

    <div>
      <label style="font-size: 12px; color: #666; display: block; margin-bottom: 8px;">Custom Duration (minutes)</label>
      <input id="custom-slider" type="range" min="1" max="60" value="5" />
      <div style="text-align: center; color: #666; font-size: 13px;" id="slider-value">5 minutes</div>
    </div>

    <div class="timer-display" id="timer-display">05:00</div>

    <div class="controls">
      <button id="start-btn" class="w3-button w3-blue w3-round" aria-label="Start meditation session">Start</button>
      <button id="pause-btn" class="w3-button w3-grey w3-round" style="display: none;" aria-label="Pause meditation">Pause</button>
      <button id="resume-btn" class="w3-button w3-blue w3-round" style="display: none;" aria-label="Resume meditation">Resume</button>
      <button id="reset-btn" class="w3-button w3-light-grey w3-round" aria-label="Reset timer">Reset</button>
    </div>

    <div class="status" id="status">Ready</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
