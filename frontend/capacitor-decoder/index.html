<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capacitor Decoder</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .color-bands {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 24px 0;
      padding: 20px;
      background-color: #f5f5f5;
      border-radius: 8px;
      flex-wrap: wrap;
    }
    .band {
      width: 40px;
      height: 100px;
      border-radius: 4px;
      border: 2px solid #ddd;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .band:hover {
      transform: scale(1.1);
      border-color: #333;
    }
    .band-label {
      position: absolute;
      top: -25px;
      font-size: 11px;
      font-weight: 600;
      color: #666;
    }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      gap: 8px;
      margin-top: 16px;
    }
    .color-option {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      border: 2px solid #ddd;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
    }
    .color-option:hover {
      transform: scale(1.05);
      border-color: #333;
    }
    .color-option.light-text { color: white; }
    .color-option.dark-text { color: #333; }
    .result {
      margin-top: 24px;
      padding: 20px;
      background-color: #e8f5e9;
      border-radius: 8px;
      border-left: 4px solid #4caf50;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #ddd;
    }
    .result-row:last-child { border-bottom: none; }
    .result-label { color: #333; }
    .result-value { font-weight: bold; font-family: monospace; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 700px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Capacitor Decoder</h1>
    <p class="w3-text-grey w3-small">Click colors to decode capacitor value. 4-band capacitor.</p>

    <div class="color-bands">
      <div class="band" id="band-1"><div class="band-label">1st Digit</div></div>
      <div class="band" id="band-2"><div class="band-label">2nd Digit</div></div>
      <div class="band" id="band-3"><div class="band-label">Multiplier</div></div>
      <div class="band" id="band-4"><div class="band-label">Tolerance</div></div>
    </div>

    <h3>Select Colors</h3>
    <div class="color-grid" id="color-grid"></div>

    <div class="result" id="result"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
