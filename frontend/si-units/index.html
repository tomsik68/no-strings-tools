<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SI Units</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 2px solid #ddd;
    }
    .tab {
      padding: 8px 16px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      font-weight: 600;
      color: #666;
    }
    .tab.active {
      border-bottom-color: #2196f3;
      color: #2196f3;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .unit-table {
      width: 100%;
      border-collapse: collapse;
    }
    .unit-table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }
    .unit-table td:first-child {
      font-weight: 600;
      color: #333;
    }
    .unit-table td:last-child {
      color: #666;
      font-family: monospace;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 700px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>SI Units & Prefixes</h1>

    <div class="tabs">
      <div class="tab active" data-tab="base">Base Units</div>
      <div class="tab" data-tab="prefixes">Prefixes</div>
    </div>

    <div id="base" class="tab-content active">
      <table class="unit-table" id="base-table"></table>
    </div>

    <div id="prefixes" class="tab-content">
      <table class="unit-table" id="prefixes-table"></table>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
