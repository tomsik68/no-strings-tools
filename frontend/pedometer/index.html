<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedometer</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .step-counter {
      font-size: 80px;
      font-weight: bold;
      text-align: center;
      font-family: monospace;
      color: #2196f3;
      margin: 40px 0;
    }
    .step-label {
      text-align: center;
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
    }
    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .btn-reset {
      background-color: #f44336;
      color: white;
    }
    .btn-reset:hover {
      background-color: #da190b;
    }
    .stats {
      margin-top: 20px;
      padding: 16px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }
    .stat-row:last-child {
      border-bottom: none;
    }
    .stat-label {
      color: #666;
    }
    .stat-value {
      font-weight: bold;
      color: #333;
      font-family: monospace;
    }
    .permission-message {
      text-align: center;
      color: #f44336;
      margin-top: 20px;
    }
    .status {
      text-align: center;
      font-size: 13px;
      color: #999;
      margin-top: 12px;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Pedometer</h1>

    <p class="w3-text-grey w3-small">Keep your phone in your pocket or hand while walking.</p>

    <div class="step-label">Steps</div>
    <div class="step-counter" id="step-count">0</div>

    <div class="controls">
      <button id="reset-btn" class="w3-button w3-round btn-reset">Reset</button>
    </div>

    <div class="stats">
      <div class="stat-row">
        <span class="stat-label">Estimated Distance</span>
        <span class="stat-value" id="distance">0.00 m</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Stride Length</span>
        <span class="stat-value">0.65 m</span>
      </div>
    </div>

    <div class="status" id="status">Waiting for motion...</div>
    <div class="permission-message" id="permission-message"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
