  <style>
    .search-box {
      margin-bottom: 16px;
    }
    .element-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 4px;
      margin-bottom: 20px;
    }
    .element {
      padding: 8px;
      border-radius: 4px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      min-height: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .element:hover {
      transform: scale(1.05);
      border-color: #333;
    }
    @media (max-width: 600px) {
      .element-grid { grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 2px; }
      .element { padding: 6px; font-size: 10px; }
    }
    .element.nonmetal { background-color: #a6d854; }
    .element.metal { background-color: #ffbb33; }
    .element.noble { background-color: #99ccff; }
    .element.alkali { background-color: #ff9999; }
    .element.alkaline { background-color: #ffddb3; }
    .element.halogen { background-color: #ffff99; }
    .detail-box {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
      margin-top: 20px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #ddd;
      font-size: 13px;
    }
    .detail-row:last-child {
      border-bottom: none;
    }
    .detail-label {
      color: #666;
    }
    .detail-value {
      font-weight: bold;
      font-family: monospace;
    }
  </style>
