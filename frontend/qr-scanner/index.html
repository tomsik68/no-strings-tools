<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Scanner</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    video { width: 100%; border-radius: 8px; background: #000; min-height: 280px; }
    .start-btn { width: 100%; padding: 14px; font-size: 16px; margin-top: 12px; }
    .result-box { background: white; padding: 16px; border-radius: 8px; border-left: 4px solid #4caf50; margin-top: 16px; }
    .result-label { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 4px; }
    .result-text { font-family: monospace; font-size: 15px; word-break: break-all; }
    .result-actions { display: flex; gap: 8px; margin-top: 12px; }
    .error { background: #ffcdd2; color: #c62828; padding: 12px; border-radius: 4px; margin-top: 16px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>QR Scanner</h1>
    <p class="w3-text-grey w3-small">Point your camera at a QR code. Decoding happens on your device.</p>

    <video id="video" autoplay playsinline muted></video>
    <button id="start-btn" class="w3-button w3-blue w3-round start-btn">📷 Start scanning</button>
    <div class="error" id="error" style="display: none;"></div>

    <div class="result-box" id="result" style="display: none;">
      <div class="result-label">Decoded</div>
      <div class="result-text" id="result-text"></div>
      <div class="result-actions">
        <button id="copy-btn" class="w3-button w3-blue w3-round w3-small">📋 Copy</button>
        <a id="open-link" class="w3-button w3-green w3-round w3-small" target="_blank" rel="noopener" style="display: none;">🔗 Open link</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
