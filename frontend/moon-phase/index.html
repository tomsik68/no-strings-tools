<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moon Phase</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .moon-emoji { font-size: 120px; text-align: center; line-height: 1.2; }
    .phase-name { font-size: 28px; font-weight: bold; text-align: center; }
    .phase-detail { text-align: center; font-size: 18px; color: #666; margin-top: 4px; }
    .next-events { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .next-event {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px 20px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }
    .next-event b { display: block; font-size: 16px; color: #333; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Moon Phase</h1>

    <label for="date-input">Date</label>
    <input id="date-input" class="w3-input w3-border w3-round" type="date" />

    <div class="moon-emoji" id="moon-emoji">🌕</div>
    <div class="phase-name" id="phase-name"></div>
    <div class="phase-detail" id="phase-detail"></div>

    <div class="next-events">
      <div class="next-event">🌕 Next full moon<b id="next-full"></b></div>
      <div class="next-event">🌑 Next new moon<b id="next-new"></b></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
