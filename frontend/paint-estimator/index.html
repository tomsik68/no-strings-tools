<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 480px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Paint / Flooring</h1>
    <p class="w3-text-grey w3-small">Room size → how much to buy.</p>

    <div class="w3-bar w3-margin-bottom">
      <button id="mode-paint" class="w3-bar-item w3-button w3-blue">Paint walls</button>
      <button id="mode-floor" class="w3-bar-item w3-button w3-white w3-border">Flooring</button>
    </div>

    <div class="w3-row-padding" style="margin: 0 -8px;">
      <div class="w3-third">
        <label for="len">Length (m)</label>
        <input id="len" type="number" min="0" step="0.1" value="4" class="w3-input w3-border w3-round" />
      </div>
      <div class="w3-third">
        <label for="wid">Width (m)</label>
        <input id="wid" type="number" min="0" step="0.1" value="3.5" class="w3-input w3-border w3-round" />
      </div>
      <div class="w3-third" id="height-wrap">
        <label for="hei">Height (m)</label>
        <input id="hei" type="number" min="0" step="0.1" value="2.5" class="w3-input w3-border w3-round" />
      </div>
    </div>

    <div id="paint-opts" class="w3-margin-top">
      <label for="coats">Coats</label>
      <input id="coats" type="number" min="1" max="5" value="2" class="w3-input w3-border w3-round" style="max-width: 80px;" />
      <label for="coverage" style="margin-top: 8px; display: block;">Coverage (m² per litre)</label>
      <input id="coverage" type="number" min="1" value="10" class="w3-input w3-border w3-round" style="max-width: 100px;" />
      <label for="can" style="margin-top: 8px; display: block;">Can size (L)</label>
      <input id="can" type="number" min="0.5" step="0.5" value="2.5" class="w3-input w3-border w3-round" style="max-width: 100px;" />
      <label for="doors" style="margin-top: 8px; display: block;">Subtract doors/windows (m²)</label>
      <input id="doors" type="number" min="0" step="0.5" value="4" class="w3-input w3-border w3-round" style="max-width: 100px;" />
    </div>

    <div id="floor-opts" class="w3-margin-top" hidden>
      <label for="waste">Waste %</label>
      <input id="waste" type="number" min="0" max="30" value="10" class="w3-input w3-border w3-round" style="max-width: 80px;" />
    </div>

    <div id="out" class="w3-panel w3-white w3-round w3-border w3-margin-top" style="padding: 16px;"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
