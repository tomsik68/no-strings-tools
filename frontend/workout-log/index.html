<body class="w3-light-grey">
  <div class="w3-container w3-padding-large card">
    <a href="../index.html" class="w3-text-blue" style="text-decoration:none; font-size:14px;">← Back</a>
    <h1 style="margin-bottom:4px;">🏋️ Workout Log</h1>
    <p class="w3-text-grey" style="margin-top:0; font-size:13px;">Log what you did. No coaching, no plans.</p>

    <div id="workout-list"></div>

    <div class="add-form">
      <div class="form-title">Log a set</div>
      <div class="form-row">
        <div class="field">
          <label for="w-exercise">Exercise</label>
          <input id="w-exercise" type="text" list="exercise-list" placeholder="Bench Press" autocomplete="off" />
          <datalist id="exercise-list">
            <option>Bench Press</option><option>Squat</option><option>Deadlift</option>
            <option>Pull-ups</option><option>Push-ups</option><option>Overhead Press</option>
            <option>Barbell Row</option><option>Dips</option><option>Lunges</option>
            <option>Romanian Deadlift</option><option>Leg Press</option><option>Lat Pulldown</option>
            <option>Bicep Curl</option><option>Tricep Pushdown</option><option>Face Pull</option>
            <option>Hip Thrust</option><option>Plank</option><option>Cable Row</option>
          </datalist>
        </div>
        <div class="field">
          <label for="w-sets">Sets</label>
          <input id="w-sets" type="number" min="1" max="99" placeholder="3" />
        </div>
        <div class="field">
          <label for="w-reps">Reps</label>
          <input id="w-reps" type="number" min="1" max="999" placeholder="10" />
        </div>
        <div class="field">
          <label for="w-weight">Weight</label>
          <input id="w-weight" type="number" min="0" step="0.5" placeholder="60" />
        </div>
      </div>
      <div class="add-row">
        <div class="date-field">
          <label for="w-date">Date</label>
          <input id="w-date" type="date" />
        </div>
        <button id="add-btn" class="w3-button w3-round" style="background:#f57c00; color:white;">Log Set</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
