  <style>
    .pick-btn { width: 100%; padding: 20px; font-size: 20px; margin-top: 16px; }
    .swatch { width: 100%; height: 120px; border-radius: 8px; border: 1px solid #ddd; margin-top: 16px; }
    .values { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .value-box { background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #2196f3; cursor: pointer; }
    .value-label { font-size: 11px; color: #999; font-weight: 600; }
    .value-text { font-family: monospace; font-size: 16px; }
    .history { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .history-swatch { width: 36px; height: 36px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; }
    .error { background: #ffcdd2; color: #c62828; padding: 12px; border-radius: 4px; margin-top: 16px; }
    .hint { font-size: 12px; color: #999; margin-top: 8px; }
  </style>

<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Eyedropper</h1>
    <p class="w3-text-grey w3-small">Pick any color from anywhere on your screen — even outside the browser.</p>

    <button id="pick-btn" class="w3-button w3-blue w3-round pick-btn">🎨 Pick a color</button>
    <div class="error" id="error" style="display: none;"></div>

    <div id="result" style="display: none;">
      <div class="swatch" id="swatch"></div>
      <div class="values">
        <div class="value-box" id="hex-box"><div class="value-label">HEX (click to copy)</div><div class="value-text" id="hex"></div></div>
        <div class="value-box" id="rgb-box"><div class="value-label">RGB (click to copy)</div><div class="value-text" id="rgb"></div></div>
      </div>
      <div class="history" id="history"></div>
      <div class="hint">Click a previous swatch to bring it back.</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
