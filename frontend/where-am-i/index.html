<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">

    <h1>Where Am I</h1>
    <p class="w3-text-grey w3-small">Your GPS coordinates, straight from the device. No map, no tiles, no network needed.</p>

        <div class="detail-box"><div class="detail-label">Heading</div><div class="detail-value" id="heading"></div></div>

    </div>
