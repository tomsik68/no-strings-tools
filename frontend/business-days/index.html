<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 480px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Business Days</h1>
    <p class="w3-text-grey w3-small">Weekends off. No holiday list — keep it simple.</p>

    <div class="w3-panel w3-white w3-round w3-border" style="padding: 16px;">
      <strong>Add N working days</strong>
      <label for="start" style="display: block; margin-top: 10px;">Start date</label>
      <input id="start" type="date" class="w3-input w3-border w3-round" />
      <label for="n" style="display: block; margin-top: 10px;">Working days to add</label>
      <input id="n" type="number" min="0" value="10" class="w3-input w3-border w3-round" style="max-width: 100px;" />
      <div id="add-out" style="font-size: 22px; font-weight: 700; margin-top: 12px;">—</div>
    </div>

    <div class="w3-panel w3-white w3-round w3-border" style="padding: 16px;">
      <strong>Count between two dates</strong>
      <label for="from" style="display: block; margin-top: 10px;">From</label>
      <input id="from" type="date" class="w3-input w3-border w3-round" />
      <label for="to" style="display: block; margin-top: 10px;">To</label>
      <input id="to" type="date" class="w3-input w3-border w3-round" />
      <div id="count-out" style="font-size: 22px; font-weight: 700; margin-top: 12px;">—</div>
    </div>
  </div>
