<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 440px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Depth of Field</h1>
    <p class="w3-text-grey w3-small">How much is in focus?</p>

    <label for="fl">Focal length (mm)</label>
    <input id="fl" type="number" min="1" value="50" class="w3-input w3-border w3-round" />
    <label for="f" style="margin-top: 10px; display: block;">Aperture (f/)</label>
    <input id="f" type="number" min="0.5" step="0.1" value="2.8" class="w3-input w3-border w3-round" />
    <label for="dist" style="margin-top: 10px; display: block;">Subject distance (m)</label>
    <input id="dist" type="number" min="0.01" step="0.1" value="3" class="w3-input w3-border w3-round" />
    <label for="sensor" style="margin-top: 10px; display: block;">Sensor</label>
    <select id="sensor" class="w3-select w3-border w3-round">
      <option value="0.03">Full frame (CoC 0.030)</option>
      <option value="0.019" selected>APS-C (CoC 0.019)</option>
      <option value="0.015">Micro Four Thirds (0.015)</option>
      <option value="0.011">1" sensor (0.011)</option>
    </select>

    <div id="out" class="w3-panel w3-white w3-round w3-border w3-margin-top" style="padding: 16px;"></div>
  </div>
  <script src="app.js"></script>
