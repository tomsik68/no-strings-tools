  <style>
    .card { max-width: 520px; margin: 0 auto; }
    .summary-box { background: white; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; border: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
    .summary-total { font-size: 26px; font-weight: 700; color: #222; }
    .summary-label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
    .summary-count { font-size: 13px; color: #888; text-align: right; }
    .sub-card { background: white; border-radius: 8px; padding: 13px 16px; margin-bottom: 8px; border: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
    .sub-info { flex: 1; min-width: 0; }
    .sub-name { font-size: 14px; font-weight: 600; color: #222; }
    .sub-meta { font-size: 12px; color: #aaa; margin-top: 2px; }
    .sub-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .sub-cost { font-size: 14px; font-weight: 700; color: #222; }
    .status-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
    .status-badge.overdue { background: #fde8e8; color: #c62828; }
    .status-badge.soon    { background: #fff3e0; color: #e65100; }
    .status-badge.ok      { background: #e8f5e9; color: #2e7d32; }
    .renew-btn { font-size: 11px; padding: 4px 10px; border-radius: 5px; border: 1px solid #1565c0; color: #1565c0; background: white; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .renew-btn:hover { background: #e3f2fd; }
    .del-btn { background: none; border: none; color: #ddd; cursor: pointer; font-size: 18px; padding: 0 2px; line-height: 1; flex-shrink: 0; }
    .del-btn:hover { color: #f44336; }
    .add-form { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 420px) { .form-row { grid-template-columns: 1fr; } }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    @media (max-width: 420px) { .form-row-3 { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .field input, .field select { padding: 9px 11px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; font-family: inherit; background: white; }
    .field input:focus, .field select:focus { outline: none; border-color: #1565c0; }
    .add-row { display: flex; justify-content: flex-end; }
    .empty { text-align: center; color: #bbb; padding: 32px 0; font-size: 14px; }

<body class="w3-light-grey">
  <div class="w3-container w3-padding-large card">
    <a href="../index.html" class="w3-text-blue" style="text-decoration:none; font-size:14px;">← Back</a>
    <h1 style="margin-bottom:4px;">💳 Subscription Tracker</h1>
    <p class="w3-text-grey" style="margin-top:0; font-size:13px;">Know what you're paying for every month.</p>

    <div id="summary"></div>
    <div id="sub-list"></div>

    <div class="add-form">
      <div class="field">
        <label for="sub-name">Service name</label>
        <input id="sub-name" type="text" placeholder="e.g. Netflix, Spotify, iCloud…" autocomplete="off" />
      </div>
      <div class="form-row-3">
        <div class="field">
          <label for="sub-cost">Cost</label>
          <input id="sub-cost" type="number" min="0" step="0.01" placeholder="9.99" />
        </div>
        <div class="field">
          <label for="sub-cycle">Cycle</label>
          <select id="sub-cycle">
            <option value="monthly">Monthly</option>
            <option value="quarterly">Quarterly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
        <div class="field">
          <label for="sub-renewal">Next renewal</label>
          <input id="sub-renewal" type="date" />
        </div>
      </div>
      <div class="add-row">
        <button id="add-btn" class="w3-button w3-round" style="background:#1565c0; color:white;">Add Subscription</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
