<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 520px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1 style="margin-bottom: 4px;">🚗 Mileage Log</h1>
    <p class="w3-text-grey" style="margin-top: 0;">Trips for tax or expenses.</p>
    <div id="summary"></div>
    <div id="list"></div>
    <div class="w3-margin-top">
      <label for="date">Date</label>
      <input id="date" type="date" class="w3-input w3-border w3-round" />
      <div class="w3-row-padding" style="margin: 8px -8px 0;">
        <div class="w3-half">
          <label for="from">From</label>
          <input id="from" class="w3-input w3-border w3-round" autocomplete="off" />
        </div>
        <div class="w3-half">
          <label for="to">To</label>
          <input id="to" class="w3-input w3-border w3-round" autocomplete="off" />
        </div>
      </div>
      <div class="w3-row-padding" style="margin: 8px -8px 0;">
        <div class="w3-half">
          <label for="km">Distance (km)</label>
          <input id="km" type="number" min="0" step="0.1" class="w3-input w3-border w3-round" />
        </div>
        <div class="w3-half">
          <label for="purpose">Purpose</label>
          <input id="purpose" class="w3-input w3-border w3-round" placeholder="Client visit…" autocomplete="off" />
        </div>
      </div>
      <button id="add" class="w3-button w3-blue w3-round w3-margin-top">Add trip</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
