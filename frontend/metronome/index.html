  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .tempo-display {
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      font-family: monospace;
      color: #333;
      margin: 20px 0;
    }
    .tempo-label {
      text-align: center;
      color: #999;
      font-size: 14px;
    }
    .beat-indicator {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background-color: #e0e0e0;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #999;
      transition: all 0.1s ease;
    }
    .beat-indicator.active {
      background-color: #4caf50;
      color: white;
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
    }
    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .btn-start {
      background-color: #4caf50;
      color: white;
    }
    .btn-start:hover {
      background-color: #45a049;
    }
    .btn-stop {
      background-color: #f44336;
      color: white;
    }
    .btn-stop:hover {
      background-color: #da190b;
    }
    .tempo-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 20px;
    }
    .tempo-control input {
      flex: 1;
      max-width: 200px;
    }
    .tempo-control button {
      padding: 8px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      border-radius: 4px;
    }
    .tempo-control button:hover {
      background-color: #f5f5f5;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Metronome</h1>

    <div class="tempo-display" id="tempo-display">120</div>
    <div class="tempo-label">BPM (Beats Per Minute)</div>

    <div class="beat-indicator" id="beat-indicator">🎵</div>

    <div class="controls">
      <button id="start-btn" class="w3-button w3-round btn-start">▶️ Start</button>
      <button id="stop-btn" class="w3-button w3-round btn-stop" style="display: none;">⏹️ Stop</button>
    </div>

    <div class="tempo-control">
      <button id="tempo-minus" class="w3-small">−</button>
      <input id="tempo-slider" type="range" min="40" max="240" value="120" />
      <button id="tempo-plus" class="w3-small">+</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
