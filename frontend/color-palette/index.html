  <style>
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;

    }
    .color-card {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      cursor: pointer;
    }
    .color-swatch {
      width: 100%;
      height: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transition: transform 0.2s ease;
    }
    .color-card:hover .color-swatch {
      transform: scale(1.05);
    }
    .color-info {
      background: white;
      padding: 8px;
      text-align: center;
      font-size: 12px;
    }
    .color-hex {
      font-weight: bold;
      font-family: monospace;
      margin-bottom: 4px;
    }
