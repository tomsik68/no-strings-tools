<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Palette Generator</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }
    .color-card {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      cursor: pointer;
    }
    .color-swatch {
      width: 100%;
      height: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transition: transform 0.2s ease;
    }
    .color-card:hover .color-swatch {
      transform: scale(1.05);
    }
    .color-info {
      background: white;
      padding: 8px;
      text-align: center;
      font-size: 12px;
    }
    .color-hex {
      font-weight: bold;
      font-family: monospace;
      margin-bottom: 4px;
    }
    .color-copy-feedback {
      font-size: 10px;
      color: #4caf50;
      min-height: 14px;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 700px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Color Palette Generator</h1>

    <div style="margin-top: 20px;">
      <button id="generate-btn" class="w3-button w3-blue w3-round">Generate Palette</button>
    </div>

    <div class="palette-grid" id="palette-grid"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
