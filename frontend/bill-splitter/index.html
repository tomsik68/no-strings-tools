<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bill Splitter</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    th {
      background-color: #f5f5f5;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      font-size: 14px;
      border-bottom: 2px solid #ddd;
    }
    td {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }
    input {
      width: 100%;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 14px;
      font-family: inherit;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 3px rgba(0, 123, 255, 0.3);
    }
    .delete-btn {
      padding: 4px 8px;
      background-color: #f44336;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }
    .delete-btn:hover {
      background-color: #da190b;
    }
    .summary {
      margin-top: 24px;
      padding: 16px;
      background-color: #f9f9f9;
      border-radius: 4px;
    }
    .summary-item {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
    }
    .summary-item:last-child {
      border-bottom: none;
    }
    .summary-item strong {
      color: #333;
    }
    .total {
      padding: 8px 0;
      font-size: 16px;
      font-weight: bold;
      color: #007bff;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 700px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Bill Splitter</h1>

    <div class="w3-margin-top">
      <label for="payer-input" class="w3-text-grey">Who paid the bill?</label>
      <input
        id="payer-input"
        type="text"
        class="w3-input w3-border w3-round w3-margin-bottom"
        placeholder="Payer name..."
        autocomplete="off"
      />
    </div>

    <div>
      <label class="w3-text-grey">Items</label>
      <table>
        <thead>
          <tr>
            <th>Description</th>
            <th>Price</th>
            <th>Buyer</th>
            <th style="width: 50px;"></th>
          </tr>
        </thead>
        <tbody id="items-tbody">
        </tbody>
      </table>
    </div>

    <div style="margin-top: 12px;">
      <button id="add-item-btn" class="w3-button w3-blue w3-round">+ Add Item</button>
    </div>

    <div class="summary">
      <div class="w3-text-grey w3-small" style="margin-bottom: 12px;">Summary</div>
      <div id="summary-content">No items yet.</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
