<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Difference</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .date-row label { font-size: 12px; font-weight: 600; color: #666; display: block; margin-bottom: 4px; }
    input[type=date] { width: 100%; font-size: 15px; border: 1px solid #ddd; border-radius: 4px; padding: 8px; box-sizing: border-box; }
    .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 16px; }
    .result-box { background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #2196f3; }
    .result-label { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 4px; }
    .result-value { font-size: 18px; font-weight: bold; color: #333; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Date Difference</h1>
    <p class="w3-text-grey w3-small">Pick two dates — see the time between them. Also works as an age calculator.</p>

    <div class="date-row">
      <div>
        <label for="from">From</label>
        <input id="from" type="date" />
      </div>
      <div>
        <label for="to">To</label>
        <input id="to" type="date" />
      </div>
    </div>

    <div class="result-grid">
      <div class="result-box"><div class="result-label">Total days</div><div class="result-value" id="days"></div></div>
      <div class="result-box"><div class="result-label">Weeks</div><div class="result-value" id="weeks"></div></div>
      <div class="result-box"><div class="result-label">Calendar breakdown</div><div class="result-value" id="breakdown"></div></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
