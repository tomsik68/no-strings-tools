<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV ↔ JSON</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    textarea { width: 100%; height: 200px; font-family: monospace; font-size: 12px; border: 1px solid #ddd; border-radius: 4px; padding: 8px; box-sizing: border-box; }
    .buttons { display: flex; gap: 8px; margin: 12px 0; }
    .error { background: #ffcdd2; color: #c62828; padding: 12px; border-radius: 4px; margin-bottom: 12px; }
    .pane-label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 4px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 800px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>CSV ↔ JSON</h1>
    <p class="w3-text-grey w3-small">Paste CSV (first row = headers) or a JSON array of objects, then convert.</p>

    <div class="pane-label">Input</div>
    <textarea id="input" placeholder="name,age&#10;Alice,30&#10;Bob,25" spellcheck="false"></textarea>

    <div class="buttons">
      <button id="csv-to-json" class="w3-button w3-blue w3-round">CSV → JSON</button>
      <button id="json-to-csv" class="w3-button w3-green w3-round">JSON → CSV</button>
    </div>

    <div class="error" id="error" style="display: none;"></div>
    <div class="pane-label">Output</div>
    <textarea id="output" readonly spellcheck="false"></textarea>
  </div>

  <script src="app.js"></script>
</body>
</html>
