<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Light Detector</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .light-display {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: #f0f0f0;
      margin: 40px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
      border: 4px solid #ddd;
    }
    .light-display.bright {
      background: linear-gradient(135deg, #ffeb3b 0%, #ffc107 100%);
      border-color: #ff9800;
    }
    .light-display.normal {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      border-color: #2196f3;
    }
    .light-display.dim {
      background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
      border-color: #999;
    }
    .light-value {
      font-size: 48px;
      font-weight: bold;
      text-align: center;
    }
    .light-label {
      font-size: 14px;
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
    .light-bar {
      width: 100%;
      height: 40px;
      background: linear-gradient(90deg, #424242 0%, #ffeb3b 100%);
      border-radius: 8px;
      margin-top: 20px;
      position: relative;
      overflow: hidden;
    }
    .light-indicator {
      position: absolute;
      width: 4px;
      height: 100%;
      background: #2196f3;
      top: 0;
      left: 0;
      transition: left 0.2s ease;
    }
    .level-text {
      text-align: center;
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }
    .permission-message {
      text-align: center;
      color: #f44336;
      margin-top: 20px;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Light Detector</h1>

    <p class="w3-text-grey w3-small">Ambient light level sensor. Cover/expose your device camera.</p>

    <div class="light-display" id="light-display">
      <div class="light-value" id="light-value">--</div>
    </div>

    <div class="light-label" id="light-label">--</div>

    <div class="light-bar">
      <div class="light-indicator" id="light-indicator"></div>
    </div>
    <div class="level-text" id="level-text">lux</div>

    <div class="permission-message" id="permission-message"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
