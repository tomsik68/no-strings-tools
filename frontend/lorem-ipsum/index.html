<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorem Ipsum Generator</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 700px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Lorem Ipsum</h1>

    <div style="display: flex; gap: 12px; align-items: end; flex-wrap: wrap;">
      <div>
        <label for="count-input">Paragraphs</label>
        <input id="count-input" class="w3-input w3-border w3-round" type="number" min="1" max="50" value="3" style="width: 100px;" />
      </div>
      <button id="generate-btn" class="w3-button w3-green w3-round">Regenerate</button>
      <button id="copy-btn" class="w3-button w3-blue w3-round">Copy</button>
      <span id="copy-feedback" class="w3-text-green"></span>
    </div>

    <textarea
      id="output"
      class="w3-input w3-border w3-round"
      rows="16"
      readonly
      style="margin-top: 16px; resize: vertical;"
      aria-label="Generated placeholder text"
    ></textarea>
  </div>

  <script src="app.js"></script>
</body>
</html>
