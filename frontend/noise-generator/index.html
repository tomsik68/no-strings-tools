  <style>
    .noise-types {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      margin-top: 16px;
    }
    .noise-btn {
      padding: 12px;
      border: 2px solid #ddd;

      border-radius: 6px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    }
    .noise-btn.active {
      background-color: #2196f3;
      color: white;
      border-color: #2196f3;
    }
    .controls {
      margin-top: 20px;
      padding: 16px;
      background-color: #f5f5f5;
      border-radius: 4px;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .control-row:last-child {
      margin-bottom: 0;
    }
    label {
      min-width: 80px;
      font-weight: 600;
      font-size: 13px;
      color: #333;
    }
    input[type="range"] {
      flex: 1;
    }
    .value-display {
      min-width: 50px;
      text-align: right;
      font-weight: 600;
    }
    .status {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
    .status.playing {
      color: #4caf50;
      font-weight: bold;
    }
    .play-btn {
      background-color: #4caf50;
      color: white;
    }
    .play-btn:hover {
      background-color: #45a049;
    }
    .stop-btn {
      background-color: #f44336;
      color: white;
    }

    <h1>Noise Generator</h1>

    <p class="w3-text-grey w3-small">Generate relaxing or focusing background noise.</p>

      <button class="noise-btn" data-type="brown">Brown</button>

    </div>

    <div class="status" id="status">Ready</div>
  </div>
