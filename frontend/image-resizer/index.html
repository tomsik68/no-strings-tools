<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Resizer</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .drop-zone { display: block; border: 2px dashed #bbb; border-radius: 8px; padding: 40px 16px; text-align: center; color: #888; margin-top: 16px; cursor: pointer; }
    .drop-zone.over { border-color: #2196f3; color: #2196f3; }
    .size-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; }
    .error { background: #ffcdd2; color: #c62828; padding: 12px; border-radius: 4px; margin-top: 16px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Image Resizer</h1>
    <p class="w3-text-grey w3-small">Drop an image, get resized JPEG versions ready to download. Processed entirely on your device.</p>

    <label class="drop-zone" id="drop-zone">
      🖼️ Drop an image here or click to choose
      <input id="file-input" type="file" accept="image/*" style="display: none;" />
    </label>

    <p id="info" class="w3-small w3-text-grey" style="display: none;"></p>
    <ul id="results" class="w3-ul w3-border w3-round" style="padding: 0; display: none;"></ul>
    <div class="error" id="error" style="display: none;"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
