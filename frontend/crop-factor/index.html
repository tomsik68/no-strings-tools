<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 420px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Crop Factor</h1>
    <p class="w3-text-grey w3-small">Lens mm → full-frame equivalent.</p>

    <label for="fl">Focal length (mm)</label>
    <input id="fl" type="number" min="1" value="35" class="w3-input w3-border w3-round" />
    <label for="crop" style="margin-top: 12px; display: block;">Sensor / crop</label>
    <select id="crop" class="w3-select w3-border w3-round">
      <option value="1">Full frame (1×)</option>
      <option value="1.5" selected>APS-C Nikon/Sony/Fuji (1.5×)</option>
      <option value="1.6">APS-C Canon (1.6×)</option>
      <option value="2">Micro Four Thirds (2×)</option>
      <option value="2.7">1" sensor (~2.7×)</option>
      <option value="5.6">1/2.3" phone (~5.6×)</option>
    </select>
    <label for="custom" style="margin-top: 12px; display: block;">Or custom crop</label>
    <input id="custom" type="number" min="0.5" step="0.01" class="w3-input w3-border w3-round" placeholder="e.g. 1.3" />

    <div id="out" class="w3-panel w3-white w3-round w3-border w3-margin-top" style="padding: 16px;"></div>
  </div>
  <script src="app.js"></script>
