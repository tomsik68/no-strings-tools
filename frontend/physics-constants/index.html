<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physics Constants</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .constants-list {
      list-style: none;
      padding: 0;
      margin-top: 16px;
    }
    .constant-item {
      background: white;
      padding: 16px;
      margin-bottom: 8px;
      border-radius: 6px;
      border-left: 4px solid #2196f3;
    }
    .constant-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }
    .constant-symbol {
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
      font-family: monospace;
    }
    .constant-value {
      font-size: 14px;
      color: #2196f3;
      font-family: monospace;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Physics Constants</h1>
    <ul class="constants-list" id="constants-list"></ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
