  <style>
    .card { max-width: 520px; margin: 0 auto; }
    .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .stat { background: white; border-radius: 8px; padding: 12px 14px; flex: 1; text-align: center; border: 1px solid #eee; }
    .stat-val { font-size: 20px; font-weight: 700; color: #222; }
    .stat-lbl { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
    .fillup-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: white; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; }
    .fillup-body { flex: 1; min-width: 0; }
    .fillup-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .fillup-date { font-size: 14px; font-weight: 600; color: #222; }
    .fillup-odo { font-size: 12px; color: #aaa; }
    .fillup-bottom { font-size: 13px; color: #666; margin-top: 3px; }
    .del-btn { background: none; border: none; color: #ddd; cursor: pointer; font-size: 18px; padding: 0 2px; line-height: 1; flex-shrink: 0; }
    .del-btn:hover { color: #f44336; }
    .add-form { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 400px) { .form-grid { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .field input { padding: 9px 11px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; font-family: inherit; }
    .field input:focus { outline: none; border-color: #43a047; }
    .add-row { display: flex; justify-content: flex-end; }
    .empty { text-align: center; color: #bbb; padding: 32px 0; font-size: 14px; }
    .car-section { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .car-tab { padding: 6px 14px; border: 1px solid #ddd; border-radius: 20px; background: white; color: #666; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .car-tab.active { background: #43a047; color: white; border-color: #43a047; }
    .car-add-btn { padding: 5px 12px; border: 1px dashed #ccc; border-radius: 20px; background: transparent; color: #999; font-size: 13px; font-family: inherit; cursor: pointer; }
    .car-add-btn:hover { border-color: #43a047; color: #43a047; }
    .no-cars { font-size: 13px; color: #aaa; }
    .car-actions { display: flex; gap: 8px; margin-bottom: 10px; }
    .rename-car-btn, .delete-car-btn { font-size: 12px; padding: 3px 10px; border-radius: 5px; border: 1px solid #ccc; background: white; color: #888; cursor: pointer; font-family: inherit; }
    .delete-car-btn { border-color: #ffcdd2; color: #c62828; }
    .rename-car-btn:hover { background: #f5f5f5; }
    .delete-car-btn:hover { background: #ffebee; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large card">
    <a href="../index.html" class="w3-text-blue" style="text-decoration:none; font-size:14px;">← Back</a>
    <h1 style="margin-bottom:4px;">⛽ Fuel Log</h1>
    <p class="w3-text-grey" style="margin-top:0; font-size:13px;">Track fill-ups, consumption and spend — no account needed.</p>

    <div class="car-section" id="car-tabs"></div>
    <div class="car-actions" id="car-actions"></div>

    <div id="stats"></div>
    <div id="fillup-list"></div>

    <div class="add-form" id="add-form">
      <div class="form-grid">
        <div class="field" style="grid-column:1/-1">
          <label for="f-date">Date</label>
          <input id="f-date" type="date" />
        </div>
        <div class="field">
          <label for="f-odometer">Odometer (km)</label>
          <input id="f-odometer" type="number" min="0" placeholder="e.g. 48 230" />
        </div>
        <div class="field">
          <label for="f-litres">Litres</label>
          <input id="f-litres" type="number" min="0" step="0.01" placeholder="e.g. 42.5" />
        </div>
        <div class="field" style="grid-column:1/-1">
          <label for="f-price">Price per litre</label>
          <input id="f-price" type="number" min="0" step="0.001" placeholder="e.g. 1.65" />
        </div>
      </div>
      <div class="add-row">
        <button id="add-btn" class="w3-button w3-round" style="background:#43a047; color:white;">Log Fill-up</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
