<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hash Generator</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    textarea { width: 100%; height: 120px; font-family: monospace; font-size: 13px; border: 1px solid #ddd; border-radius: 4px; padding: 8px; box-sizing: border-box; }
    .hash-grid { display: grid; gap: 12px; margin-top: 16px; }
    .hash-box { background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #2196f3; }
    .hash-label { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 4px; }
    .hash-value { font-family: monospace; font-size: 13px; word-break: break-all; color: #333; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 700px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Hash Generator</h1>
    <p class="w3-text-grey w3-small">Type text or drop in a file — see its SHA hashes instantly. Nothing leaves your browser.</p>

    <textarea id="input" placeholder="Enter text to hash..." autocomplete="off"></textarea>

    <p class="w3-small w3-text-grey" style="margin: 8px 0 0;">
      …or hash a file:
      <label class="w3-button w3-light-grey w3-border w3-round w3-small">
        📄 Choose file
        <input id="file-input" type="file" style="display: none;" />
      </label>
      or drop one anywhere on this page
    </p>
    <p id="file-info" class="w3-small" style="display: none; margin: 8px 0 0;">
      <span id="file-name"></span>
      <button id="clear-file" class="w3-button w3-small w3-round" aria-label="Clear file, back to text">✕</button>
    </p>
    <div id="error" style="display: none; background: #ffcdd2; color: #c62828; padding: 12px; border-radius: 4px; margin-top: 12px;"></div>

    <div class="hash-grid" id="hashes"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
