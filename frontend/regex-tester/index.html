    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

    .flags { display: flex; gap: 12px; margin: 12px 0; }
    .flag-check { display: flex; align-items: center; gap: 4px; }

    .results { background: #f5f5f5; padding: 16px; border-radius: 8px; margin-top: 16px; }

<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 700px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Regex Tester</h1>
    <p class="w3-text-grey w3-small">Test regular expressions against text.</p>

    <div class="input-group">
      <label>Pattern</label>
      <input id="pattern" type="text" placeholder="^[a-z]+$" value="[a-z]+" />
    </div>

    <div class="flags">
      <div class="flag-check">
        <input id="flag-g" type="checkbox" checked />
        <label for="flag-g" style="margin: 0;">Global (g)</label>
      </div>
      <div class="flag-check">
        <input id="flag-i" type="checkbox" />
        <label for="flag-i" style="margin: 0;">Case-insensitive (i)</label>
      </div>
      <div class="flag-check">
        <input id="flag-m" type="checkbox" />
        <label for="flag-m" style="margin: 0;">Multiline (m)</label>
      </div>
    </div>

    <div class="input-group">
      <label>Text to Test</label>
      <textarea id="text" placeholder="Enter text here..." rows="6">The quick brown fox jumps over the lazy dog</textarea>
    </div>

    <div class="results" id="results"></div>
  </div>

  <script src="app.js"></script>
</body>
