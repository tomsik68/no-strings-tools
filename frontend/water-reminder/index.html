  <style>
    .card { max-width: 380px; margin: 0 auto; }
    .drops { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0 12px; }
    .drop { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #2196f3; background: white; transition: background .15s; }
    .drop.filled { background: #2196f3; }
    progress { width: 100%; height: 8px; border-radius: 4px; overflow: hidden; display: block; margin: 0 0 10px; }
    progress::-webkit-progress-bar { background: #e0e0e0; border-radius: 4px; }
    progress::-webkit-progress-value { background: #2196f3; border-radius: 4px; transition: width .3s; }
    progress::-moz-progress-bar { background: #2196f3; border-radius: 4px; }
    .count { text-align: center; font-size: 30px; font-weight: 700; color: #222; }
    .status { text-align: center; color: #888; font-size: 14px; margin: 6px 0 0; min-height: 20px; }
    .drink-btn {
      display: block; margin: 28px auto 6px;
      width: 100px; height: 100px; border-radius: 50%;
      background: #2196f3; border: none; cursor: pointer;
      font-size: 42px; line-height: 100px; text-align: center;
      box-shadow: 0 4px 18px rgba(33,150,243,.35);
      transition: transform .1s, box-shadow .1s;
    }
    .drink-btn:active { transform: scale(.92); box-shadow: 0 2px 8px rgba(33,150,243,.2); }
    .hint { text-align: center; color: #bbb; font-size: 12px; }
    #undo-btn { display: block; margin: 10px auto 0; background: none; border: none; color: #bbb; cursor: pointer; font-size: 13px; padding: 4px 8px; }
    #undo-btn:hover { color: #666; }
    .goal-row { display: flex; align-items: center; gap: 10px; justify-content: center; margin-top: 28px; color: #777; font-size: 14px; }
    .goal-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #ccc; background: white; cursor: pointer; font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center; }
    .goal-btn:hover { background: #f5f5f5; }
    #goal-val { font-weight: 700; color: #333; min-width: 20px; text-align: center; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large card">
    <a href="../index.html" class="w3-text-blue" style="text-decoration:none; font-size:14px;">← Back</a>
    <h1 style="margin-bottom:4px;">💧 Drink Water</h1>
    <p class="w3-text-grey" style="margin-top:0; font-size:13px;">Resets automatically each day.</p>

    <div id="drops" class="drops"></div>
    <progress id="bar" value="0" max="8"></progress>
    <div class="count"><span id="count">0</span> / <span id="goal-disp">8</span> glasses</div>
    <div class="status" id="status"></div>

    <button class="drink-btn" id="drink-btn" title="Log a glass of water">💧</button>
    <div class="hint">Tap to log a glass</div>
    <button id="undo-btn" hidden>↩ Undo last</button>

    <div class="goal-row">
      Daily goal:
      <button class="goal-btn" id="goal-minus">−</button>
      <span id="goal-val">8</span>
      <button class="goal-btn" id="goal-plus">+</button>
      glasses
    </div>
  </div>

  <script src="app.js"></script>
</body>
