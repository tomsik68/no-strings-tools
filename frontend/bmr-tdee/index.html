<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 440px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>BMR / TDEE</h1>
    <p class="w3-text-grey w3-small">Mifflin–St Jeor. Rough estimate only.</p>

    <label for="sex">Sex</label>
    <select id="sex" class="w3-select w3-border w3-round">
      <option value="m">Male</option>
      <option value="f">Female</option>
    </select>
    <div class="w3-row-padding" style="margin: 10px -8px 0;">
      <div class="w3-third">
        <label for="age">Age</label>
        <input id="age" type="number" min="15" max="100" value="30" class="w3-input w3-border w3-round" />
      </div>
      <div class="w3-third">
        <label for="h">Height (cm)</label>
        <input id="h" type="number" min="100" max="250" value="175" class="w3-input w3-border w3-round" />
      </div>
      <div class="w3-third">
        <label for="w">Weight (kg)</label>
        <input id="w" type="number" min="30" max="300" value="75" class="w3-input w3-border w3-round" />
      </div>
    </div>
    <label for="act" style="margin-top: 10px; display: block;">Activity</label>
    <select id="act" class="w3-select w3-border w3-round">
      <option value="1.2">Sedentary</option>
      <option value="1.375">Light (1–3 days/wk)</option>
      <option value="1.55" selected>Moderate (3–5 days/wk)</option>
      <option value="1.725">Hard (6–7 days/wk)</option>
      <option value="1.9">Very hard / physical job</option>
    </select>

    <div id="out" class="w3-panel w3-white w3-round w3-border w3-margin-top" style="padding: 16px;"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
