<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morse Code Tool</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 2px solid #ddd; }
    .tab { padding: 8px 16px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 600; color: #666; }
    .tab.active { border-bottom-color: #2196f3; color: #2196f3; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    textarea { width: 100%; height: 100px; font-family: monospace; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 12px; }
    .output { background: #f5f5f5; padding: 12px; border-radius: 4px; font-family: monospace; min-height: 60px; word-break: break-all; }
    .morse-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 12px; }
    .morse-table td { padding: 6px; border: 1px solid #ddd; }
    @media (max-width: 600px) {
      .tabs { flex-wrap: wrap; }
      .tab { padding: 6px 12px; font-size: 13px; }
      textarea { font-size: 16px; }
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 700px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Morse Code Tool</h1>
    <div class="tabs">
      <div class="tab active" data-tab="encode">Text → Morse</div>
      <div class="tab" data-tab="decode">Morse → Text</div>
      <div class="tab" data-tab="reference">Reference</div>
    </div>
    <div id="encode" class="tab-content active">
      <h3>Text to Morse Code</h3>
      <textarea id="encode-input" placeholder="Enter text..."></textarea>
      <div class="output" id="encode-output">--</div>
    </div>
    <div id="decode" class="tab-content">
      <h3>Morse to Text</h3>
      <textarea id="decode-input" placeholder="Enter morse (. and -, space between letters, / between words)..."></textarea>
      <div class="output" id="decode-output">--</div>
    </div>
    <div id="reference" class="tab-content">
      <h3>Morse Code Reference</h3>
      <table class="morse-table" id="morse-table"></table>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
