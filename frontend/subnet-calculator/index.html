<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subnet Calculator</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    input { width: 100%; font-family: monospace; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; padding: 10px; box-sizing: border-box; }
    .subnet-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 16px; }
    .subnet-box { background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #2196f3; }
    .subnet-label { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 4px; }
    .subnet-value { font-family: monospace; font-size: 14px; word-break: break-all; color: #333; }
    .error { background: #ffcdd2; color: #c62828; padding: 12px; border-radius: 4px; margin-top: 16px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Subnet Calculator</h1>
    <p class="w3-text-grey w3-small">Enter an IPv4 address in CIDR notation.</p>

    <input id="input" type="text" value="192.168.1.10/24" autocomplete="off" spellcheck="false" />

    <div class="error" id="error" style="display: none;"></div>
    <div class="subnet-grid" id="results"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
