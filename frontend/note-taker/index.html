  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; }
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* Header */
    .header {
      flex-shrink: 0;
      background: white;
      padding: 9px 16px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .header a { color: #2196f3; text-decoration: none; }
    .save-status { font-size: 11px; color: #bbb; }

    /* Main area */
    .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* Sidebar */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #f7f7f5;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-top {
      padding: 10px;
      flex-shrink: 0;
      border-bottom: 1px solid #e8e8e4;
    }
    #new-note-btn {
      width: 100%;
      padding: 7px 10px;
      background: #2196f3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
    }
    #new-note-btn:hover { background: #1976d2; }
    .note-list { flex: 1; overflow-y: auto; }
    .note-item {
      padding: 9px 12px;
      cursor: pointer;
      border-bottom: 1px solid #e8e8e4;
      position: relative;
      user-select: none;
    }
    .note-item:hover { background: #ebebea; }
    .note-item.active { background: #e3f2fd; }
    .note-item-title {
      font-size: 13px;
      font-weight: 600;
      color: #37352f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 22px;
    }
    .note-item-meta { font-size: 11px; color: #aaa; margin-top: 2px; }
    .note-del {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #bbb;
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
      opacity: 0;
    }
    .note-item:hover .note-del { opacity: 1; }
    .note-del:hover { color: #f44336; background: #fde; }

    /* Editor */
    .editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fafafa;
      min-width: 0;
    }
    #note {
      flex: 1;
      padding: 24px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      line-height: 1.7;
      border: none;
      resize: none;
      outline: none;
      background: #fafafa;
      min-height: 0;
      color: #333;
    }

    /* Preview */
    .preview-pane {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: white;
      border-left: 1px solid #ddd;
      min-width: 0;
      color: #333;
      font-size: 15px;
      line-height: 1.7;
    }
    .preview-pane h1 { font-size: 26px; margin: 0 0 8px; }
    .preview-pane h2 { font-size: 20px; margin: 20px 0 6px; }
    .preview-pane h3 { font-size: 17px; margin: 16px 0 4px; }
    .preview-pane h4, .preview-pane h5, .preview-pane h6 { margin: 12px 0 4px; }
    .preview-pane a { color: #2196f3; }
    .preview-pane code { background: #f0f0f0; padding: 2px 5px; border-radius: 3px; font-family: monospace; font-size: 12px; }
    .preview-pane pre { background: #f5f5f5; padding: 14px; border-radius: 5px; overflow-x: auto; margin: 12px 0; }
    .preview-pane pre code { background: none; padding: 0; font-size: 13px; }
    .preview-pane blockquote { border-left: 4px solid #2196f3; padding-left: 14px; margin: 12px 0 12px 0; color: #666; }
    .preview-pane ul, .preview-pane ol { padding-left: 22px; }
    .preview-pane hr { border: none; border-top: 1px solid #ddd; margin: 20px 0; }
    .preview-pane table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .preview-pane th, .preview-pane td { border: 1px solid #ddd; padding: 6px 10px; }
    .preview-pane th { background: #f5f5f5; }

    /* Responsive */
    @media (max-width: 900px) { .preview-pane { display: none; } }
    @media (max-width: 580px) { .sidebar { width: 160px; } }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <a href="../index.html">← Back</a>
      <span class="save-status" id="save-status">Auto-saved</span>
    </div>
    <div class="main">
      <div class="sidebar">
        <div class="sidebar-top">
          <button id="new-note-btn">+ New Note</button>
        </div>
        <div class="note-list" id="note-list"></div>
      </div>
      <div class="editor-pane">
        <textarea id="note" placeholder="Start writing… Markdown is supported."></textarea>
      </div>
      <div class="preview-pane" id="preview"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
