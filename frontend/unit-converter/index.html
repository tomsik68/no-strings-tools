<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit Converter</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .input-row { display: grid; grid-template-columns: 1fr 150px; gap: 12px; margin-bottom: 12px; }
    input { padding: 8px; font-family: monospace; border: 1px solid #ddd; border-radius: 4px; }
    select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    .unit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
    .unit-box { background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #2196f3; }
    .unit-label { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 4px; }
    .unit-value { font-family: monospace; font-size: 14px; word-break: break-all; color: #333; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Unit Converter</h1>
    <p class="w3-text-grey w3-small">Enter a value and its unit — see it in all related units.</p>

    <div class="input-row">
      <input id="value-input" type="number" placeholder="Enter value" autocomplete="off" value="1" aria-label="Value" />
      <select id="unit-select" aria-label="Source unit"></select>
    </div>

    <div class="unit-grid" id="results"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
