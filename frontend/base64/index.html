<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base64 Encoder/Decoder</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 2px solid #ddd;
    }
    .tab {
      padding: 8px 16px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      font-weight: 600;
      color: #666;
    }
    .tab.active {
      border-bottom-color: #2196f3;
      color: #2196f3;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    textarea {
      width: 100%;
      height: 150px;
      font-family: monospace;
      font-size: 12px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      resize: vertical;
      margin-bottom: 12px;
    }
    .button-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .output-box {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 4px;
      min-height: 100px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      white-space: pre-wrap;
    }
    .copy-btn {
      padding: 6px 12px;
      font-size: 12px;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 700px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Base64 Encoder/Decoder</h1>

    <div class="tabs">
      <div class="tab active" data-tab="encode">Encode</div>
      <div class="tab" data-tab="decode">Decode</div>
    </div>

    <!-- Encode Tab -->
    <div id="encode" class="tab-content active">
      <h3>Text to Base64</h3>
      <textarea id="encode-input" placeholder="Enter text to encode..."></textarea>
      <div class="button-row">
        <button class="w3-button w3-blue w3-round copy-btn" id="copy-encoded">📋 Copy</button>
      </div>
      <h4>Output</h4>
      <div class="output-box" id="encode-output">--</div>
    </div>

    <!-- Decode Tab -->
    <div id="decode" class="tab-content">
      <h3>Base64 to Text</h3>
      <textarea id="decode-input" placeholder="Enter base64 to decode..."></textarea>
      <div class="button-row">
        <button class="w3-button w3-blue w3-round copy-btn" id="copy-decoded">📋 Copy</button>
      </div>
      <h4>Output</h4>
      <div class="output-box" id="decode-output">--</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
