<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case Converter</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    input[type=text] { width: 100%; font-family: monospace; font-size: 15px; border: 1px solid #ddd; border-radius: 4px; padding: 10px; box-sizing: border-box; }
    .case-grid { display: grid; gap: 12px; margin-top: 16px; }
    .case-box { background: white; padding: 12px; border-radius: 8px; border-left: 4px solid #2196f3; }
    .case-label { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 4px; }
    .case-value { font-family: monospace; font-size: 14px; word-break: break-all; color: #333; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Case Converter</h1>
    <p class="w3-text-grey w3-small">Type anything — see it in every programming case style.</p>

    <input id="input" type="text" placeholder="e.g. my variable name" autocomplete="off" />

    <div class="case-grid" id="results"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
