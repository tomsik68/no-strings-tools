<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voltage Divider Calculator</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    input { width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .result { background: #f5f5f5; padding: 16px; border-radius: 8px; margin-top: 16px; }
    .result-row { display: flex; justify-content: space-between; padding: 8px 0; }
    .result-value { font-weight: bold; font-family: monospace; }
    .diagram { background: #f0f8ff; padding: 12px; border-radius: 4px; margin-top: 12px; font-size: 12px; border-left: 4px solid #2196f3; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Voltage Divider Calculator</h1>
    <p class="w3-text-grey w3-small">Calculates output voltage of a voltage divider circuit.</p>
    <div class="grid-2">
      <div>
        <label style="font-size: 12px; color: #666;">Input Voltage (V)</label>
        <input id="input-voltage" type="number" value="10" min="0" step="0.1" />
      </div>
      <div>
        <label style="font-size: 12px; color: #666;">R1 (Ω)</label>
        <input id="r1" type="number" value="1000" min="1" />
      </div>
      <div>
        <label style="font-size: 12px; color: #666;">R2 (Ω)</label>
        <input id="r2" type="number" value="1000" min="1" />
      </div>
    </div>
    <div class="result" id="result"></div>
    <div class="diagram">Vout = Vin × R2 / (R1 + R2)</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
