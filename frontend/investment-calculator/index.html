<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investment Calculator</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .result-box {
      background-color: #e8f5e9;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      border-left: 4px solid #4caf50;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #c8e6c9;
      font-size: 14px;
    }
    .result-row:last-child {
      border-bottom: none;
    }
    .result-label {
      color: #666;
    }
    .result-value {
      font-weight: bold;
      color: #2e7d32;
      font-family: monospace;
    }
    .input-row {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      color: #333;
      font-size: 13px;
    }
    input {
      width: 100%;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Investment Calculator</h1>

    <div class="input-row">
      <label for="initial">Initial Investment ($)</label>
      <input id="initial" type="number" class="w3-input w3-border w3-round" value="10000" />
    </div>

    <div class="input-row">
      <label for="monthly">Monthly Contribution ($)</label>
      <input id="monthly" type="number" class="w3-input w3-border w3-round" value="500" />
    </div>

    <div class="input-row">
      <label for="return-rate">Annual Return Rate (%)</label>
      <input id="return-rate" type="number" class="w3-input w3-border w3-round" value="8" step="0.01" />
    </div>

    <div class="input-row">
      <label for="years">Time Period (Years)</label>
      <input id="years" type="number" class="w3-input w3-border w3-round" value="10" />
    </div>

    <div class="result-box">
      <div class="result-row">
        <span class="result-label">Total Invested</span>
        <span class="result-value" id="total-invested">$0</span>
      </div>
      <div class="result-row">
        <span class="result-label">Investment Gain</span>
        <span class="result-value" id="investment-gain">$0</span>
      </div>
      <div class="result-row">
        <span class="result-label">Future Value</span>
        <span class="result-value" id="future-value">$0</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
