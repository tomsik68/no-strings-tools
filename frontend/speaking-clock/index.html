  <style>
    .clock-display {
      font-size: 64px;
      font-weight: bold;
      text-align: center;
      font-family: monospace;
      color: #333;
      margin: 30px 0;
    }
    .date-display {
      text-align: center;
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
    }
    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .btn-announce {
      background-color: #4caf50;
      color: white;
    }
    .btn-announce:hover {
      background-color: #45a049;
    }
    .btn-stop {
      background-color: #f44336;
      color: white;
    }
    .btn-stop:hover {
      background-color: #da190b;
    }
    .options {
      margin-top: 20px;
      padding: 16px;
      background-color: #f5f5f5;
      border-radius: 4px;
    }
    .option-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .option-group:last-child {
      margin-bottom: 0;
    }
    .option-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .option-group label {
      cursor: pointer;
      font-size: 14px;
      flex: 1;
    }
    .interval-control {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }
    .interval-control label {
      min-width: 140px;
      font-size: 13px;
      font-weight: 600;
    }
    .interval-control input {
      width: 80px;
    }
    .interval-control select {

<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Speaking Clock</h1>

    <div class="date-display" id="date-display"></div>
    <div class="clock-display" id="clock-display">00:00:00</div>

    <div class="controls">
      <button id="announce-btn" class="w3-button w3-round btn-announce">🔊 Announce Time</button>
      <button id="stop-btn" class="w3-button w3-round btn-stop" style="display: none;">⏹️ Stop</button>
    </div>

    <div class="options">
      <div class="option-group">
        <input id="auto-announce" type="checkbox" />
        <label for="auto-announce">Auto-announce every interval</label>
      </div>

      <div class="interval-control">
        <label for="interval-select">Announce every:</label>
        <input id="interval-input" type="number" min="1" max="60" value="1" />
        <select id="interval-select">
          <option value="minute">Minute</option>
          <option value="hour">Hour</option>
        </select>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
