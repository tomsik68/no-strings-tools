<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 480px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Rent vs Buy</h1>
    <p class="w3-text-grey w3-small">Rough numbers only — not financial advice.</p>

    <label for="price">Home price</label>
    <input id="price" type="number" min="0" value="300000" class="w3-input w3-border w3-round" />
    <label for="down" style="margin-top: 10px; display: block;">Down payment %</label>
    <input id="down" type="number" min="0" max="100" value="20" class="w3-input w3-border w3-round" />
    <label for="rate" style="margin-top: 10px; display: block;">Mortgage rate % / year</label>
    <input id="rate" type="number" min="0" step="0.1" value="4" class="w3-input w3-border w3-round" />
    <label for="years" style="margin-top: 10px; display: block;">Loan term (years)</label>
    <input id="years" type="number" min="1" value="30" class="w3-input w3-border w3-round" />
    <label for="rent" style="margin-top: 10px; display: block;">Monthly rent (alternative)</label>
    <input id="rent" type="number" min="0" value="1200" class="w3-input w3-border w3-round" />
    <label for="horizon" style="margin-top: 10px; display: block;">Stay horizon (years)</label>
    <input id="horizon" type="number" min="1" value="7" class="w3-input w3-border w3-round" />
    <label for="growth" style="margin-top: 10px; display: block;">Home value growth % / year</label>
    <input id="growth" type="number" step="0.1" value="2" class="w3-input w3-border w3-round" />

    <div id="out" class="w3-panel w3-white w3-round w3-border w3-margin-top" style="padding: 16px;"></div>
  </div>
