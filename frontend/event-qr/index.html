  <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Event QR","url":"https://nostrings.tools/event-qr/","description":"Turn an event into a QR code and downloadable calendar file (.ics).","applicationCategory":"UtilitiesApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"browserRequirements":"Requires JavaScript","author":{"@type":"Person","name":"Tomáš Jašek","url":"https://jasku.xyz"}}</script>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />

</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Event QR</h1>
    <p class="w3-text-grey">Scan to add the event, or download an .ics file.</p>

    <label for="title-input">Title</label>
    <input id="title-input" class="w3-input w3-border w3-round" type="text" autocomplete="off" placeholder="Team lunch" />

    <label for="start-input" style="margin-top: 12px; display: block;">Starts</label>
    <input id="start-input" class="w3-input w3-border w3-round" type="datetime-local" />

    <label for="end-input" style="margin-top: 12px; display: block;">Ends</label>
    <input id="end-input" class="w3-input w3-border w3-round" type="datetime-local" />

    <label for="loc-input" style="margin-top: 12px; display: block;">Location <span class="w3-text-grey">(optional)</span></label>
    <input id="loc-input" class="w3-input w3-border w3-round" type="text" autocomplete="off" />

    <label for="desc-input" style="margin-top: 12px; display: block;">Notes <span class="w3-text-grey">(optional)</span></label>
    <input id="desc-input" class="w3-input w3-border w3-round" type="text" autocomplete="off" />

    <div class="w3-center" style="margin-top: 24px;">
      <canvas id="qr-canvas" width="256" height="256" aria-label="Event QR code"></canvas>
    </div>
    <div class="w3-center" style="margin-bottom: 16px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
      <button id="ics-btn" class="w3-button w3-blue w3-round" style="display: none;">Download .ics</button>
      <button id="png-btn" class="w3-button w3-blue w3-round" style="display: none;">Download PNG</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
