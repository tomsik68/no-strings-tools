<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dead Pixel Checker</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .start-btn { width: 100%; padding: 20px; font-size: 20px; margin-top: 16px; }
    #screen { position: fixed; inset: 0; display: none; cursor: pointer; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Dead Pixel Checker</h1>
    <p class="w3-text-grey w3-small">Fills your screen with solid colors. Look closely for dots that stay dark (dead) or the wrong color (stuck) on every background.</p>
    <ul class="w3-small w3-text-grey">
      <li><strong>Click or tap</strong> to cycle: white, black, red, green, blue, cyan, magenta, yellow</li>
      <li><strong>Arrow keys</strong> also work</li>
      <li><strong>Esc</strong> to exit</li>
    </ul>

    <button id="start-btn" class="w3-button w3-blue w3-round start-btn">🔲 Start fullscreen test</button>
  </div>

  <div id="screen"></div>

  <script src="app.js"></script>
</body>
</html>
