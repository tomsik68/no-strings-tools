<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 480px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>DPI / Print Size</h1>
    <p class="w3-text-grey w3-small">Pixels + DPI → physical print size.</p>

    <div class="w3-row-padding" style="margin: 0 -8px;">
      <div class="w3-half">
        <label for="width-px">Width (px)</label>
        <input id="width-px" type="number" min="1" value="3000" class="w3-input w3-border w3-round" />
      </div>
      <div class="w3-half">
        <label for="height-px">Height (px)</label>
        <input id="height-px" type="number" min="1" value="2000" class="w3-input w3-border w3-round" />
      </div>
    </div>

    <label for="dpi" style="margin-top: 12px; display: block;">DPI</label>
    <input id="dpi" type="number" min="1" value="300" class="w3-input w3-border w3-round" style="max-width: 160px;" />
    <div class="w3-margin-top">
      <button type="button" class="w3-button w3-small w3-border w3-round dpi-preset" data-dpi="72">72</button>
      <button type="button" class="w3-button w3-small w3-border w3-round dpi-preset" data-dpi="150">150</button>
      <button type="button" class="w3-button w3-small w3-border w3-round dpi-preset" data-dpi="300">300</button>
      <button type="button" class="w3-button w3-small w3-border w3-round dpi-preset" data-dpi="600">600</button>
    </div>

    <div id="results" class="w3-margin-top"></div>
  </div>
  <script src="app.js"></script>
