<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode@latest/build/qrcode.min.js"></script>
  <style>
    #qr-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 280px;
      background-color: #f5f5f5;
      border-radius: 4px;
      margin-top: 16px;
    }
    canvas {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 500px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>QR Code Generator</h1>

    <div class="w3-margin-top">
      <label for="text-input" class="w3-text-grey">Text or URL</label>
      <input
        id="text-input"
        type="text"
        class="w3-input w3-border w3-round w3-margin-bottom"
        placeholder="Enter text or URL..."
        autocomplete="off"
      />
    </div>

    <div id="qr-container">
      <canvas id="qr-canvas"></canvas>
    </div>

    <div style="margin-top: 12px;">
      <button id="download-btn" class="w3-button w3-blue w3-round">Download</button>
      <p id="download-feedback" class="w3-text-grey w3-small" style="margin-top: 4px; min-height: 20px;"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
