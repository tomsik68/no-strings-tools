<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entropy Calculator</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    textarea { width: 100%; height: 100px; font-family: monospace; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    .meter { background: #ddd; height: 20px; border-radius: 4px; overflow: hidden; margin: 12px 0; }
    .meter-fill { height: 100%; transition: all 0.3s; display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; }
    .result { background: #f5f5f5; padding: 12px; border-radius: 4px; margin-top: 12px; }
    .result-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Entropy Calculator</h1>
    <p class="w3-text-grey w3-small">Measure password strength and entropy.</p>
    <textarea id="password-input" placeholder="Enter password..."></textarea>
    <div class="meter"><div class="meter-fill" id="strength-meter" style="width: 0%; background: #f44336;">Weak</div></div>
    <div class="result" id="result"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
