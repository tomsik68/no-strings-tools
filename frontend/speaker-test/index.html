<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speaker Test</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .btn-grid button { padding: 24px; font-size: 17px; }
    .playing { outline: 3px solid #2196f3; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Speaker Test</h1>
    <p class="w3-text-grey w3-small">Check that left and right channels work — and aren't swapped. The sweep runs 100 Hz → 10 kHz to reveal rattles and dropouts.</p>

    <div class="btn-grid">
      <button id="left" class="w3-button w3-white w3-border w3-round">🔈 Left</button>
      <button id="right" class="w3-button w3-white w3-border w3-round">Right 🔈</button>
      <button id="both" class="w3-button w3-white w3-border w3-round">🔊 Both</button>
      <button id="sweep" class="w3-button w3-white w3-border w3-round">📈 Sweep</button>
    </div>
    <p id="status" class="w3-center w3-text-grey" style="margin-top: 12px;">&nbsp;</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
