<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 440px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Transfer Time</h1>
    <p class="w3-text-grey w3-small">Size + speed → how long.</p>

    <div class="w3-row-padding" style="margin: 0 -8px;">
      <div class="w3-half">
        <label for="size">File size</label>
        <input id="size" type="number" min="0" step="any" value="1" class="w3-input w3-border w3-round" />
      </div>
      <div class="w3-half">
        <label for="size-unit">Unit</label>
        <select id="size-unit" class="w3-select w3-border w3-round">
          <option value="1e6">MB</option>
          <option value="1e9" selected>GB</option>
          <option value="1e12">TB</option>
          <option value="1e3">KB</option>
        </select>
      </div>
    </div>
    <div class="w3-row-padding" style="margin: 10px -8px 0;">
      <div class="w3-half">
        <label for="speed">Speed</label>
        <input id="speed" type="number" min="0" step="any" value="100" class="w3-input w3-border w3-round" />
      </div>
      <div class="w3-half">
        <label for="speed-unit">Unit</label>
        <select id="speed-unit" class="w3-select w3-border w3-round">
          <option value="1e6" selected>Mbps (megabits)</option>
          <option value="1e5">MB/s (megabytes)</option>
          <option value="1e9">Gbps</option>
          <option value="1e3">Kbps</option>
        </select>
      </div>
    </div>
    <p class="w3-text-grey w3-small">Note: 1 byte = 8 bits. ISP “100 Mbps” ≈ 12.5 MB/s peak.</p>
    <div id="out" class="w3-panel w3-white w3-round w3-border w3-margin-top" style="padding: 16px;"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
