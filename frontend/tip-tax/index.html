<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 420px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Tip &amp; Tax</h1>
    <p class="w3-text-grey w3-small">Bill → tip → tax → split.</p>

    <label for="bill">Bill amount</label>
    <input id="bill" type="number" min="0" step="0.01" value="50" class="w3-input w3-border w3-round" />

    <label for="tip" style="margin-top: 12px; display: block;">Tip %</label>
    <input id="tip" type="number" min="0" step="0.5" value="10" class="w3-input w3-border w3-round" />
    <div class="w3-margin-top">
      <button type="button" class="w3-button w3-small w3-border w3-round tip-p" data-v="0">0%</button>
      <button type="button" class="w3-button w3-small w3-border w3-round tip-p" data-v="10">10%</button>
      <button type="button" class="w3-button w3-small w3-border w3-round tip-p" data-v="15">15%</button>
      <button type="button" class="w3-button w3-small w3-border w3-round tip-p" data-v="20">20%</button>
    </div>

    <label for="tax" style="margin-top: 12px; display: block;">Tax / VAT %</label>
    <input id="tax" type="number" min="0" step="0.1" value="0" class="w3-input w3-border w3-round" />
    <label class="w3-margin-top" style="display: block;">
      <input id="tax-included" type="checkbox" /> Tax already included in bill
    </label>

    <label for="split" style="margin-top: 12px; display: block;">Split between</label>
    <input id="split" type="number" min="1" step="1" value="1" class="w3-input w3-border w3-round" style="max-width: 100px;" />

    <div id="out" class="w3-panel w3-white w3-round w3-border w3-margin-top" style="padding: 16px;"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
