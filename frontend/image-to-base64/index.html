<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image to Base64</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .drop-zone {
      display: block;
      border: 2px dashed #aaa;
      border-radius: 12px;
      padding: 40px 16px;
      text-align: center;
      color: #666;
      cursor: pointer;
      margin-top: 12px;
    }
    .drop-zone.dragover { border-color: #2196f3; background: #e3f2fd; }
    .preview-img { max-width: 100%; max-height: 200px; margin-top: 12px; border-radius: 8px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 700px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Image to Base64</h1>

    <label class="drop-zone" id="drop-zone">
      Drop an image here or click to choose
      <input type="file" id="file-input" accept="image/*" style="display: none;" />
    </label>

    <div class="w3-center"><img id="preview" class="preview-img" style="display: none;" alt="Preview of chosen image" /></div>

    <p class="w3-text-grey" id="info"></p>

    <textarea
      id="output"
      class="w3-input w3-border w3-round"
      rows="8"
      readonly
      style="display: none; font-family: 'Courier New', monospace; font-size: 12px; resize: vertical; word-break: break-all;"
      aria-label="Base64 data URI"
    ></textarea>

    <button id="copy-btn" class="w3-button w3-blue w3-round" style="display: none; margin-top: 12px;">Copy data URI</button>
    <span id="copy-feedback" class="w3-text-green"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
