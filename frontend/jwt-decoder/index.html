<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JWT Decoder</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    textarea {
      width: 100%;
      height: 100px;
      font-family: monospace;
      font-size: 12px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      resize: vertical;
    }
    .sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    .section {
      background: white;
      padding: 16px;
      border-radius: 8px;
      border-left: 4px solid #2196f3;
    }
    .section h3 {
      margin-top: 0;
      font-size: 13px;
      color: #666;
      font-weight: 600;
      text-transform: uppercase;
    }
    .json-output {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      word-break: break-all;
      white-space: pre-wrap;
    }
    .error {
      background: #ffcdd2;
      color: #c62828;
      padding: 12px;
      border-radius: 4px;
      margin-top: 16px;
    }
    .status {
      padding: 12px;
      border-radius: 4px;
      margin-top: 16px;
      font-size: 13px;
    }
    .status.valid {
      background: #c8e6c9;
      color: #2e7d32;
    }
    .status.invalid {
      background: #ffcdd2;
      color: #c62828;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 900px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>JWT Decoder</h1>
    <p class="w3-text-grey w3-small">Paste a JWT token to decode it. Does not verify signature—for verification, use your backend.</p>

    <textarea id="jwt-input" placeholder="Paste JWT token here..."></textarea>

    <div id="error-container"></div>

    <div id="status-container"></div>

    <div class="sections">
      <div class="section">
        <h3>Header</h3>
        <div class="json-output" id="header-output">--</div>
      </div>

      <div class="section">
        <h3>Payload</h3>
        <div class="json-output" id="payload-output">--</div>
      </div>
    </div>

    <div class="section" style="margin-top: 16px;">
      <h3>Signature</h3>
      <div class="json-output" id="signature-output">--</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
