<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 520px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1 style="margin-bottom: 4px;">✨ Wishlist</h1>
    <p class="w3-text-grey" style="margin-top: 0;">Things you want. Check off when you get them.</p>

    <div id="summary" class="w3-margin-bottom"></div>
    <div id="item-list"></div>

    <div class="w3-margin-top">
      <label for="item-name">Item</label>
      <input id="item-name" type="text" class="w3-input w3-border w3-round" placeholder="What do you want?" autocomplete="off" />
      <div class="w3-row-padding" style="margin: 8px -8px 0;">
        <div class="w3-half">
          <label for="item-price">Price <span class="w3-text-grey">(optional)</span></label>
          <input id="item-price" type="number" min="0" step="0.01" class="w3-input w3-border w3-round" placeholder="0.00" />
        </div>
        <div class="w3-half">
          <label for="item-url">Link <span class="w3-text-grey">(optional)</span></label>
          <input id="item-url" type="url" class="w3-input w3-border w3-round" placeholder="https://…" />
        </div>
      </div>
      <button id="add-btn" class="w3-button w3-blue w3-round w3-margin-top">Add</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
