<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day Counter</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .entry { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; margin-top: 8px; }
    .count { font-size: 20px; font-weight: 600; }
    .delete-btn { background: none; border: none; font-size: 22px; color: #999; cursor: pointer; padding: 4px 8px; }
    .delete-btn:hover { color: #c62828; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto; margin-bottom: 24px;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Day Counter</h1>
    <p class="w3-text-grey w3-small">Save dates and see how many days ago they were — or how many days are left. Stored on your device.</p>

    <form id="add-form" class="w3-margin-top">
      <input id="date-input" type="date" class="w3-input w3-border w3-round" required autofocus aria-label="Date" />
      <input id="label-input" type="text" class="w3-input w3-border w3-round w3-margin-top" placeholder="Label (optional), e.g. Moved in, Trip to Rome" aria-label="Label (optional)" maxlength="60" />
      <button type="submit" class="w3-button w3-blue w3-round w3-margin-top" style="width: 100%;">➕ Add date</button>
    </form>

    <p id="empty" class="w3-text-grey w3-center w3-margin-top">No dates yet — pick one above.</p>
    <ul id="list" class="w3-ul" style="list-style: none; padding: 0;"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
