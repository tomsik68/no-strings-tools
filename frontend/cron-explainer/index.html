<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cron Expression Explainer</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    input {
      width: 100%;
      padding: 8px;
      font-family: monospace;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .explanation {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
    }
    .field {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ddd;
    }
    .field:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .field-name {
      font-weight: 600;
      color: #333;
      font-size: 13px;
    }
    .field-value {
      color: #666;
      font-size: 12px;
      margin-top: 4px;
    }
    .english {
      background: #bbdefb;
      padding: 12px;
      border-radius: 4px;
      margin-top: 12px;
      font-size: 14px;
      color: #1565c0;
      font-weight: 500;
    }
    .help {
      background: #f0f8ff;
      padding: 12px;
      border-radius: 4px;
      border-left: 4px solid #2196f3;
      font-size: 12px;
      margin-top: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 700px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Cron Expression Explainer</h1>
    <p class="w3-text-grey w3-small">Paste a cron expression to understand when it runs.</p>

    <input id="cron-input" type="text" placeholder="0 9 * * 1-5" value="0 9 * * 1-5" />

    <div class="explanation" id="explanation"></div>

    <div class="help">
      <strong>Format:</strong> minute hour day month day-of-week<br>
      <strong>Example:</strong> 0 9 * * 1-5 = Every weekday at 9:00 AM<br>
      <strong>Special:</strong> * = any, 1-5 = range, */5 = every 5
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
