<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 520px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1 style="margin-bottom: 4px;">⏱️ Work Hours</h1>
    <p class="w3-text-grey" style="margin-top: 0;">Clock in, clock out. See this week's total.</p>

    <div class="w3-panel w3-white w3-round w3-border w3-center" style="padding: 20px;">
      <div class="w3-text-grey w3-small" style="text-transform: uppercase; letter-spacing: .04em;">This week</div>
      <div id="week-total" style="font-size: 36px; font-weight: 700; margin: 4px 0;">0:00</div>
      <div id="status-line" class="w3-text-grey w3-small">Not clocked in</div>
      <div style="margin-top: 16px;">
        <button id="clock-btn" class="w3-button w3-blue w3-round w3-large">Clock In</button>
      </div>
    </div>

    <div class="w3-margin-top">
      <div class="w3-text-grey w3-small" style="margin-bottom: 8px;">Recent entries</div>
      <div id="entry-list"></div>
    </div>

    <details class="w3-margin-top">
      <summary class="w3-text-grey" style="cursor: pointer;">Add entry manually</summary>
      <div class="w3-margin-top">
        <label for="man-date">Date</label>
        <input id="man-date" type="date" class="w3-input w3-border w3-round" />
        <div class="w3-row-padding" style="margin: 8px -8px 0;">
          <div class="w3-half">
            <label for="man-start">Start</label>
            <input id="man-start" type="time" class="w3-input w3-border w3-round" value="09:00" />
          </div>
          <div class="w3-half">
            <label for="man-end">End</label>
            <input id="man-end" type="time" class="w3-input w3-border w3-round" value="17:00" />
          </div>
        </div>
        <button id="man-add" class="w3-button w3-blue w3-round w3-margin-top">Add</button>
      </div>
    </details>
  </div>
  <script src="app.js"></script>
</body>
