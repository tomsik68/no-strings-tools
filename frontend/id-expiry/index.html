<body class="w3-light-grey">

        <option>Residence permit</option>

      </datalist>
      <label for="exp" style="margin-top: 8px; display: block;">Expires</label>
      <input id="exp" type="date" class="w3-input w3-border w3-round" />
      <label for="note" style="margin-top: 8px; display: block;">Note <span class="w3-text-grey">(optional)</span></label>
