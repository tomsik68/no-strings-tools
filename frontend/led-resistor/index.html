<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LED Resistor Calculator</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    input { width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .result { background: #f5f5f5; padding: 16px; border-radius: 8px; margin-top: 16px; }
    .result-row { display: flex; justify-content: space-between; padding: 8px 0; }
    .result-value { font-weight: bold; font-family: monospace; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>LED Resistor Calculator</h1>
    <p class="w3-text-grey w3-small">Calculate the resistor needed to limit current to your LED.</p>
    <div class="grid-2">
      <div>
        <label style="font-size: 12px; color: #666;">Supply Voltage (V)</label>
        <input id="supply-voltage" type="number" value="5" min="1" step="0.1" />
      </div>
      <div>
        <label style="font-size: 12px; color: #666;">LED Forward Voltage (V)</label>
        <input id="led-voltage" type="number" value="2" min="1" step="0.1" />
      </div>
      <div>
        <label style="font-size: 12px; color: #666;">Desired Current (mA)</label>
        <input id="desired-current" type="number" value="20" min="1" step="1" />
      </div>
      <div>
        <label style="font-size: 12px; color: #666;">Power Rating (W)</label>
        <input id="power-rating" type="number" value="0.25" min="0.1" step="0.1" />
      </div>
    </div>
    <div class="result" id="result"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
