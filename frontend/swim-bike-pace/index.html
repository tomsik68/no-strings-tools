<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 440px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1>Swim &amp; Bike Pace</h1>
    <div class="w3-bar w3-margin-bottom">
      <button id="mode-swim" class="w3-bar-item w3-button w3-blue">Swim</button>
      <button id="mode-bike" class="w3-bar-item w3-button w3-white w3-border">Bike</button>
    </div>

    <label for="dist">Distance</label>
    <div style="display: flex; gap: 8px;">
      <input id="dist" type="number" min="0" step="any" value="1500" class="w3-input w3-border w3-round" style="flex: 1;" />
      <select id="dist-unit" class="w3-select w3-border w3-round" style="width: 100px;">
        <option value="m" selected>m</option>
        <option value="km">km</option>
        <option value="mi">mi</option>
      </select>
    </div>
    <label style="margin-top: 12px; display: block;">Time</label>
    <div style="display: flex; gap: 8px;">
      <input id="h" type="number" min="0" value="0" class="w3-input w3-border w3-round" style="width: 70px;" aria-label="Hours" placeholder="h" />
      <input id="m" type="number" min="0" max="59" value="25" class="w3-input w3-border w3-round" style="width: 70px;" aria-label="Minutes" placeholder="m" />
      <input id="s" type="number" min="0" max="59" value="0" class="w3-input w3-border w3-round" style="width: 70px;" aria-label="Seconds" placeholder="s" />
    </div>
    <div id="out" class="w3-panel w3-white w3-round w3-border w3-margin-top" style="padding: 16px;"></div>
  </div>
  <script src="app.js"></script>
