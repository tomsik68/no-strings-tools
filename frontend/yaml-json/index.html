<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAML ⇄ JSON</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <style>
    .pane { width: 100%; height: 60vh; font-family: "Courier New", monospace; font-size: 14px; resize: vertical; }
    @media (max-width: 600px) { .pane { height: 35vh; } }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 1100px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>YAML ⇄ JSON</h1>
    <p class="w3-text-grey">Paste either one on the left — the other appears on the right.</p>

    <div class="w3-row-padding" style="margin-left: -8px; margin-right: -8px;">
      <div class="w3-col m6" style="margin-bottom: 8px;">
        <label for="input">Input <span id="input-kind" class="w3-text-grey"></span></label>
        <textarea id="input" class="w3-input w3-border w3-round pane" spellcheck="false" placeholder="key: value&#10;list:&#10;  - one&#10;  - two"></textarea>
      </div>
      <div class="w3-col m6">
        <label for="output">Output <span id="output-kind" class="w3-text-grey"></span></label>
        <textarea id="output" class="w3-input w3-border w3-round pane" spellcheck="false" readonly aria-label="Converted output"></textarea>
      </div>
    </div>

    <p class="w3-text-red" id="error" style="display: none;"></p>
    <button id="copy-btn" class="w3-button w3-blue w3-round">Copy output</button>
    <span id="copy-feedback" class="w3-text-green"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
