<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Scaler</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px; }
    .ingredient-list { margin-top: 20px; }
    .ingredient-row { background: white; padding: 12px; border-radius: 4px; margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
    .ingredient-row input { margin: 0; flex: 1; }
    .delete-btn { padding: 6px 8px; font-size: 11px; cursor: pointer; }
    .scaled { background: #f0f8ff; padding: 8px; border-radius: 4px; margin-top: 4px; font-weight: 600; color: #1976d2; }
    .add-btn { padding: 8px 16px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 600px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Recipe Scaler</h1>
    <p class="w3-text-grey w3-small">Scale recipe ingredients by servings.</p>

    <div class="grid-2">
      <div>
        <label style="font-size: 12px; color: #666;">Original Servings</label>
        <input id="original-servings" type="number" value="4" min="1" />
      </div>
      <div>
        <label style="font-size: 12px; color: #666;">Desired Servings</label>
        <input id="desired-servings" type="number" value="4" min="1" />
      </div>
    </div>

    <h3 style="margin-top: 20px;">Ingredients</h3>
    <div class="ingredient-list" id="ingredient-list"></div>
    <button class="w3-button w3-blue w3-round add-btn" id="add-ingredient">+ Add Ingredient</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
