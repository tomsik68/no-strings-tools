  <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Plant Watering","url":"https://nostrings.tools/plant-watering/","description":"Track when your plants need watering. See what's overdue, log a watering with one tap.","applicationCategory":"UtilitiesApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"browserRequirements":"Requires JavaScript","author":{"@type":"Person","name":"Tomáš Jašek","url":"https://jasku.xyz"}}</script>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .card { max-width: 540px; margin: 0 auto; }
    .plant-card { background: white; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #eee; }
    .plant-top { display: flex; align-items: center; gap: 10px; }
    .plant-icon { font-size: 20px; flex-shrink: 0; }
    .plant-name { flex: 1; font-size: 15px; font-weight: 600; color: #222; }
    .status-badge { font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
    .status-badge.overdue { background: #fde8e8; color: #c62828; }
    .status-badge.soon { background: #fff3e0; color: #e65100; }
    .status-badge.ok { background: #e8f5e9; color: #2e7d32; }
    .plant-del { background: none; border: none; color: #ddd; cursor: pointer; font-size: 18px; padding: 0 2px; line-height: 1; flex-shrink: 0; }
    .plant-del:hover { color: #f44336; }
    .plant-meta { font-size: 12px; color: #aaa; margin-top: 6px; }
    .water-btn { margin-top: 10px; font-size: 12px; padding: 5px 12px; border-radius: 5px; border: 1px solid #43a047; color: #2e7d32; background: white; cursor: pointer; font-family: inherit; }
    .water-btn:hover { background: #e8f5e9; }
    .add-form { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 420px) { .form-row { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .field input, .field select { padding: 9px 11px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; font-family: inherit; background: white; }
    .field input:focus, .field select:focus { outline: none; border-color: #43a047; }
    .add-row { display: flex; justify-content: flex-end; }
    .empty { text-align: center; color: #bbb; padding: 32px 0; font-size: 14px; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large card">
    <a href="../index.html" class="w3-text-blue" style="text-decoration:none; font-size:14px;">← Back</a>
    <h1 style="margin-bottom:4px;">🪴 Plant Watering</h1>
    <p class="w3-text-grey" style="margin-top:0; font-size:13px;">See what needs water. Tap to log it.</p>

    <div id="plants-list"></div>

    <div class="add-form">
      <div class="field">
        <label for="new-name">Plant name</label>
        <input id="new-name" type="text" list="plant-suggestions" placeholder="e.g. Pothos" autocomplete="off" />
        <datalist id="plant-suggestions">
          <option>Pothos</option>
          <option>Snake Plant</option>
          <option>Monstera</option>
          <option>Fiddle Leaf Fig</option>
          <option>Peace Lily</option>
          <option>Spider Plant</option>
          <option>ZZ Plant</option>
          <option>Succulent</option>
          <option>Cactus</option>
          <option>Orchid</option>
        </datalist>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="last-watered">Last watered</label>
          <input id="last-watered" type="date" />
        </div>
        <div class="field">
          <label for="interval-select">Water every</label>
          <select id="interval-select">
            <option value="1">Every day</option>
            <option value="2">Every 2 days</option>
            <option value="3">Every 3 days</option>
            <option value="5">Every 5 days</option>
            <option value="7" selected>Weekly</option>
            <option value="14">Every 2 weeks</option>
            <option value="21">Every 3 weeks</option>
            <option value="30">Monthly</option>
          </select>
        </div>
      </div>
      <div class="add-row">
        <button id="add-btn" class="w3-button w3-round" style="background:#43a047; color:white;">Add Plant</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
