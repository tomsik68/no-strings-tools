<head>
  <meta charset="UTF-8" />

<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 480px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>
    <h1 style="margin-bottom: 4px;">🃏 Flashcards</h1>
    <p class="w3-text-grey" style="margin-top: 0;">One deck. Flip. Know or again.</p>

    <div id="study" class="w3-center" style="min-height: 180px;">
      <div id="card" class="w3-panel w3-white w3-round w3-border" style="padding: 40px 20px; cursor: pointer; min-height: 140px; display: flex; align-items: center; justify-content: center;">
        <div id="card-text" style="font-size: 20px; font-weight: 600;">Add cards below</div>
      </div>
      <div id="progress" class="w3-text-grey w3-small"></div>
      <div id="actions" class="w3-margin-top" hidden>
        <button id="again-btn" class="w3-button w3-orange w3-round">Again</button>
        <button id="know-btn" class="w3-button w3-green w3-round">Know</button>
      </div>
      <p id="hint" class="w3-text-grey w3-small">Tap card to flip</p>
    </div>

    <details class="w3-margin-top">
      <summary style="cursor: pointer;">Edit cards</summary>
      <div class="w3-margin-top">
        <label for="front">Front</label>
        <input id="front" class="w3-input w3-border w3-round" autocomplete="off" />
        <label for="back" style="margin-top: 8px; display: block;">Back</label>
        <input id="back" class="w3-input w3-border w3-round" autocomplete="off" />
        <button id="add-card" class="w3-button w3-blue w3-round w3-margin-top">Add card</button>
        <div id="card-list" class="w3-margin-top"></div>
      </div>
    </details>
  </div>
  <script src="app.js"></script>
</body>
</html>
