<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Touch Tester</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    #area { width: 100%; height: 65vh; background: white; border: 1px solid #ddd; border-radius: 8px; margin-top: 16px; touch-action: none; display: block; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 700px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Touch Tester</h1>
    <p class="w3-text-grey w3-small">Put fingers on the area below — every touch point shows up with its coordinates. Checks multi-touch and finds unresponsive screen regions. Mouse works too.</p>

    <p class="w3-center" style="margin: 8px 0 0;"><b id="count">0</b> active · max seen <b id="max">0</b></p>
    <canvas id="area"></canvas>
  </div>

  <script src="app.js"></script>
</body>
</html>
