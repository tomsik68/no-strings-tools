<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colorblindness Simulator</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
  <style>
    .drop-zone {
      display: block;
      border: 2px dashed #aaa;
      border-radius: 12px;
      padding: 40px 16px;
      text-align: center;
      color: #666;
      cursor: pointer;
      margin-top: 12px;
    }
    .drop-zone.dragover { border-color: #2196f3; background: #e3f2fd; }
    .sim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    @media (max-width: 500px) { .sim-grid { grid-template-columns: 1fr; } }
    .sim-item { text-align: center; }
    .sim-item canvas { max-width: 100%; border-radius: 8px; border: 1px solid #ddd; }
    .sim-item p { margin: 4px 0 0 0; font-weight: 600; }
    .sim-item span { font-size: 12px; color: #666; }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-container w3-padding-large w3-card w3-margin-top" style="max-width: 800px; margin-left: auto; margin-right: auto;">
    <a href="../index.html" class="w3-text-blue" style="text-decoration: none;">← Back</a>

    <h1>Colorblindness Simulator</h1>
    <p class="w3-text-grey">See your image (a chart, a UI screenshot…) the way ~8% of men see it.</p>

    <label class="drop-zone" id="drop-zone">
      Drop an image here or click to choose
      <input type="file" id="file-input" accept="image/*" style="display: none;" />
    </label>

    <div class="sim-grid" id="grid" style="display: none;">
      <div class="sim-item"><canvas id="canvas-original"></canvas><p>Original</p><span>&nbsp;</span></div>
      <div class="sim-item"><canvas id="canvas-protanopia"></canvas><p>Protanopia</p><span>no red cones · ~1% of men</span></div>
      <div class="sim-item"><canvas id="canvas-deuteranopia"></canvas><p>Deuteranopia</p><span>no green cones · ~1% of men, ~5% weak</span></div>
      <div class="sim-item"><canvas id="canvas-tritanopia"></canvas><p>Tritanopia</p><span>no blue cones · rare</span></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
