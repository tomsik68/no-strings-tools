  <style>
    .card { max-width: 480px; margin: 0 auto; }
    .today-box { background: white; border-radius: 10px; padding: 20px; border: 1px solid #eee; margin-bottom: 20px; }
    .today-date { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
    .gratitude-input { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
    .gratitude-num { font-size: 22px; font-weight: 700; color: #e0e0e0; width: 20px; flex-shrink: 0; line-height: 1; }
    .gratitude-input input { flex: 1; border: none; border-bottom: 2px solid #f5e6a3; padding: 6px 0; font-size: 15px; font-family: inherit; background: transparent; color: #222; outline: none; }
    .gratitude-input input:focus { border-bottom-color: #f9a825; }
    .gratitude-input input::placeholder { color: #ccc; }
    .history-section { margin-top: 0; }
    .history-title { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
    .dot-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
    .dot { width: 18px; height: 18px; border-radius: 50%; background: #eee; cursor: pointer; position: relative; }
    .dot.filled { background: #f9a825; }
    .dot.today { outline: 2px solid #333; outline-offset: 1px; }
    .dot[title]:hover::after { content: attr(title); position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: white; font-size: 11px; padding: 3px 7px; border-radius: 4px; white-space: nowrap; pointer-events: none; z-index: 10; }
    .past-entry { background: white; border-radius: 8px; padding: 13px 16px; margin-bottom: 8px; border: 1px solid #eee; }
    .past-date { font-size: 12px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
    .past-item { font-size: 14px; color: #444; padding: 2px 0; display: flex; gap: 8px; }
    .past-num { color: #f9a825; font-weight: 700; flex-shrink: 0; }
    .empty { text-align: center; color: #bbb; padding: 24px 0; font-size: 14px; }
  </style>

<body class="w3-light-grey">
  <div class="w3-container w3-padding-large card">

    <h1 style="margin-bottom:4px;">🙏 Gratitude Journal</h1>
    <p class="w3-text-grey" style="margin-top:0; font-size:13px;">Three things you're grateful for today.</p>

    <div class="today-box">
      <div class="today-date" id="today-date-label"></div>
      <div class="gratitude-input">
        <span class="gratitude-num">1</span>
        <input id="g1" type="text" placeholder="I'm grateful for…" autocomplete="off" />
      </div>
      <div class="gratitude-input">
        <span class="gratitude-num">2</span>
        <input id="g2" type="text" placeholder="I'm grateful for…" autocomplete="off" />
      </div>
      <div class="gratitude-input">
        <span class="gratitude-num">3</span>
        <input id="g3" type="text" placeholder="I'm grateful for…" autocomplete="off" />
      </div>
    </div>

    <div class="history-section">
      <div class="history-title">Last 30 days</div>
      <div class="dot-grid" id="dot-grid"></div>
      <div id="history-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
